<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300">
  <!-- Title -->
  <text x="225" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Plant Growth (cm)</text>

  <!-- Y-axis -->
  <line x1="50" y1="50" x2="50" y2="250" stroke="black" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="50" y1="250" x2="430" y2="250" stroke="black" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="30" y="254" text-anchor="end" font-family="Arial" font-size="12">0</text>
  <text x="30" y="214" text-anchor="end" font-family="Arial" font-size="12">5</text>
  <text x="30" y="174" text-anchor="end" font-family="Arial" font-size="12">10</text>
  <text x="30" y="134" text-anchor="end" font-family="Arial" font-size="12">15</text>
  <text x="30" y="94" text-anchor="end" font-family="Arial" font-size="12">20</text>
  <text x="30" y="54" text-anchor="end" font-family="Arial" font-size="12">25</text>

  <!-- Y-axis gridlines -->
  <line x1="50" y1="210" x2="430" y2="210" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="170" x2="430" y2="170" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="130" x2="430" y2="130" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="90" x2="430" y2="90" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="50" x2="430" y2="50" stroke="#ddd" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="90" y="270" text-anchor="middle" font-family="Arial" font-size="12">Day 1</text>
  <text x="170" y="270" text-anchor="middle" font-family="Arial" font-size="12">Day 3</text>
  <text x="250" y="270" text-anchor="middle" font-family="Arial" font-size="12">Day 5</text>
  <text x="330" y="270" text-anchor="middle" font-family="Arial" font-size="12">Day 7</text>
  <text x="410" y="270" text-anchor="middle" font-family="Arial" font-size="12">Day 9</text>

  <!-- Data line -->
  <polyline points="90,218 170,186 250,154 330,106 410,74" fill="none" stroke="green" stroke-width="2"/>

  <!-- Data points -->
  <circle cx="90" cy="218" r="5" fill="green"/>
  <circle cx="170" cy="186" r="5" fill="green"/>
  <circle cx="250" cy="154" r="5" fill="green"/>
  <circle cx="330" cy="106" r="5" fill="green"/>
  <circle cx="410" cy="74" r="5" fill="green"/>

  <!-- Data point value labels -->
  <text x="90" y="235" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">4</text>
  <text x="170" y="203" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">8</text>
  <text x="250" y="171" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">12</text>
  <text x="330" y="123" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">18</text>
  <text x="410" y="91" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">22</text>
</svg>