<svg width="440" height="280" xmlns="http://www.w3.org/2000/svg">
  <!-- Triangle with correct angle proportions: A=95°, B=67°, C=18° -->
  <!-- A=(100,240) bottom-left 95°, B=(93,160) top 67°, C=(340,240) bottom-right 18° -->
  <polygon points="100,240 93,160 340,240" fill="lightskyblue" fill-opacity="0.15" stroke="black" stroke-width="2"/>

  <!-- Extended base line for exterior angle -->
  <line x1="340" y1="240" x2="425" y2="240" stroke="black" stroke-width="2"/>

  <!-- 95° angle arc at A -->
  <path d="M 125,240 A 25,25 0 0,0 98,216" fill="none" stroke="dimgray" stroke-width="1.5"/>
  <text x="118" y="225" font-family="Arial" font-size="15" fill="dimgray">95°</text>

  <!-- w° angle label at B (67°) -->
  <path d="M 90,185 A 25,25 0 0,1 106,165" fill="none" stroke="red" stroke-width="1.5"/>
  <text x="105" y="155" font-family="Arial" font-size="16" fill="red" font-weight="bold">w°</text>

  <!-- 18° angle arc at C (interior) -->
  <path d="M 315,240 A 25,25 0 0,0 317,233" fill="none" stroke="dimgray" stroke-width="1.5"/>
  <text x="295" y="232" font-family="Arial" font-size="12" fill="dimgray">18°</text>

  <!-- 162° exterior angle arc at C -->
  <path d="M 365,240 A 25,25 0 0,0 317,233" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <text x="350" y="220" font-family="Arial" font-size="15" fill="#7c3aed" font-weight="bold">162°</text>

  <!-- Small square to show this is not a right angle at A -->
</svg>