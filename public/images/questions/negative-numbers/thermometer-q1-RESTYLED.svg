<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">

  <!-- Thermometer tube -->
  <rect x="175" y="38" width="30" height="220" rx="15" ry="15" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Thermometer bulb -->
  <circle cx="190" cy="268" r="22" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Mercury in bulb -->
  <circle cx="190" cy="268" r="17" fill="#f87171"/>

  <!-- Mercury column (up to -3 level) -->
  <rect x="183" y="175" width="14" height="82" fill="#f87171" rx="2"/>

  <!-- Scale markings -->
  <!-- Major ticks -->
  <line x1="155" y1="45" x2="175" y2="45" stroke="#3b82f6" stroke-width="2"/>
  <text x="143" y="50" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">10</text>

  <line x1="155" y1="95" x2="175" y2="95" stroke="#3b82f6" stroke-width="2"/>
  <text x="143" y="100" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">5</text>

  <line x1="150" y1="145" x2="175" y2="145" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="143" y="150" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">0</text>

  <line x1="155" y1="195" x2="175" y2="195" stroke="#3b82f6" stroke-width="2"/>
  <text x="143" y="200" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">-5</text>

  <line x1="155" y1="245" x2="175" y2="245" stroke="#3b82f6" stroke-width="2"/>
  <text x="143" y="250" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">-10</text>

  <!-- Minor ticks -->
  <line x1="163" y1="55" x2="175" y2="55" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="65" x2="175" y2="65" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="75" x2="175" y2="75" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="85" x2="175" y2="85" stroke="#93c5fd" stroke-width="1.5"/>

  <line x1="163" y1="105" x2="175" y2="105" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="115" x2="175" y2="115" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="125" x2="175" y2="125" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="135" x2="175" y2="135" stroke="#93c5fd" stroke-width="1.5"/>

  <line x1="163" y1="155" x2="175" y2="155" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="165" x2="175" y2="165" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="175" x2="175" y2="175" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="185" x2="175" y2="185" stroke="#93c5fd" stroke-width="1.5"/>

  <line x1="163" y1="205" x2="175" y2="205" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="215" x2="175" y2="215" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="225" x2="175" y2="225" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="163" y1="235" x2="175" y2="235" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- Arrow pointing to -3 -->
  <line x1="210" y1="175" x2="252" y2="175" stroke="#6366f1" stroke-width="2"/>
  <polygon points="208,175 216,171 216,179" fill="#6366f1"/>
  <text x="258" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#dc2626">-3°C</text>

  <!-- °C label -->
  <text x="190" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">°C</text>

</svg>
