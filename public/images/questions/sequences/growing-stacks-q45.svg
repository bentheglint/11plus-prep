<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    text { font-family: Arial, sans-serif; fill: #333; }
  </style>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-size="16" font-weight="bold">Growing Stack Pattern</text>
  <text x="200" y="48" text-anchor="middle" font-size="13" fill="#555">+6 books each week</text>

  <!-- Baseline -->
  <line x1="10" y1="230" x2="390" y2="230" stroke="#999" stroke-width="1"/>

  <!-- Week 1: 6 blocks -->
  <rect x="22" y="80" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="22" y="105" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="22" y="130" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="22" y="155" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="22" y="180" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="22" y="205" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <!-- Count on blocks -->
  <text x="42" y="97" text-anchor="middle" font-size="10" fill="#444">6</text>
  <text x="42" y="122" text-anchor="middle" font-size="10" fill="#444">5</text>
  <text x="42" y="147" text-anchor="middle" font-size="10" fill="#444">4</text>
  <text x="42" y="172" text-anchor="middle" font-size="10" fill="#444">3</text>
  <text x="42" y="197" text-anchor="middle" font-size="10" fill="#444">2</text>
  <text x="42" y="222" text-anchor="middle" font-size="10" fill="#444">1</text>
  <text x="42" y="248" text-anchor="middle" font-size="13" font-weight="bold">Week 1</text>
  <text x="42" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">6</text>

  <!-- Week 2: 12 blocks -->
  <rect x="110" y="80" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="110" y="105" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="110" y="130" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="110" y="155" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="110" y="180" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="110" y="205" width="40" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <!-- New books (darker shade) -->
  <rect x="150" y="80" width="40" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="150" y="105" width="40" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="150" y="130" width="40" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="150" y="155" width="40" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="150" y="180" width="40" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
