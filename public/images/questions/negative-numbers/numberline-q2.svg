<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Which number is the smallest?</text>

  <!-- Number line: from -10 to 5 -->
  <!-- x positions: -10 at x=30, 5 at x=370. Each unit = (370-30)/15 = 22.67px -->
  <line x1="25" y1="160" x2="380" y2="160" stroke="#333" stroke-width="2"/>

  <!-- Arrowheads -->
  <polygon points="22,160 30,156 30,164" fill="#333"/>
  <polygon points="383,160 375,156 375,164" fill="#333"/>

  <!-- Tick marks and labels for every integer -->
  <!-- -10 at x=30 -->
  <line x1="30" y1="155" x2="30" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="30" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">-10</text>

  <!-- -9 at x=52.67 -->
  <line x1="52.7" y1="157" x2="52.7" y2="163" stroke="#999" stroke-width="0.8"/>

  <!-- -8 at x=75.33 -->
  <line x1="75.3" y1="155" x2="75.3" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="75.3" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">-8</text>

  <!-- -7 at x=98 -->
  <line x1="98" y1="157" x2="98" y2="163" stroke="#999" stroke-width="0.8"/>

  <!-- -6 at x=120.67 -->
  <line x1="120.7" y1="155" x2="120.7" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="120.7" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">-6</text>

  <!-- -5 at x=143.33 -->
  <line x1="143.3" y1="155" x2="143.3" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="143.3" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">-5</text>

  <!-- -4 at x=166 -->
  <line x1="166" y1="157" x2="166" y2="163" stroke="#999" stroke-width="0.8"/>

  <!-- -3 at x=188.67 -->
  <line x1="188.7" y1="157" x2="188.7" y2="163" stroke="#999" stroke-width="0.8"/>

  <!-- -2 at x=211.33 -->
  <line x1="211.3" y1="155" x2="211.3" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="211.3" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">-2</text>

  <!-- -1 at x=234 -->
  <line x1="234" y1="157" x2="234" y2="163" stroke="#999" stroke-width="0.8"/>

  <!-- 0 at x=256.67 -->
  <line x1="256.7" y1="153" x2="256.7" y2="167" stroke="#333" stroke-width="2"/>
  <text x="256.7" y="182" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#333">0</text>

  <!-- 1 at x=279.33 -->
  <line x1="279.3" y1="157" x2="279.3" y2="163" stroke="#999" stroke-width="0.8"/>

  <!-- 2 at x=302 -->
  <line x1="302" y1="155" x2="302" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="302" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">2</text>

  <!-- 3 at x=324.67 -->
  <line x1="324.7" y1="155" x2="324.7" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="324.7" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">3</text>

  <!-- 4 at x=347.33 -->
  <line x1="347.3" y1="157" x2="347.3" y2="163" stroke="#999" stroke-width="0.8"/>

  <!-- 5 at x=370 -->
  <line x1="370" y1="155" x2="370" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="370" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">5</text>

  <!-- Blue dots for the five numbers: -5, 3, -2, 0, -8 -->
  <!-- -8 at x=75.3 -->
  <circle cx="75.3" cy="160" r="7" fill="#2E86C1" stroke="#1A5276" stroke-width="1.5"/>
  <text x="75.3" y="130" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2E86C1">-8</text>
  <line x1="75.3" y1="135" x2="75.3" y2="152" stroke="#2E86C1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- -5 at x=143.3 -->
  <circle cx="143.3" cy="160" r="7" fill="#2E86C1" stroke="#1A5276" stroke-width="1.5"/>
  <text x="143.3" y="110" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2E86C1">-5</text>
  <line x1="143.3" y1="115" x2="143.3" y2="152" stroke="#2E86C1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- -2 at x=211.3 -->
  <circle cx="211.3" cy="160" r="7" fill="#2E86C1" stroke="#1A5276" stroke-width="1.5"/>
  <text x="211.3" y="130" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2E86C1">-2</text>
  <line x1="211.3" y1="135" x2="211.3" y2="152" stroke="#2E86C1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 0 at x=256.7 -->
  <circle cx="256.7" cy="160" r="7" fill="#2E86C1" stroke="#1A5276" stroke-width="1.5"/>
  <text x="256.7" y="110" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2E86C1">0</text>
  <line x1="256.7" y1="115" x2="256.7" y2="152" stroke="#2E86C1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 3 at x=324.7 -->
  <circle cx="324.7" cy="160" r="7" fill="#2E86C1" stroke="#1A5276" stroke-width="1.5"/>
  <text x="324.7" y="130" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2E86C1">3</text>
  <line x1="324.7" y1="135" x2="324.7" y2="152" stroke="#2E86C1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Hint text -->
  <text x="200" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#777" font-style="italic">Smaller numbers are further left</text>
</svg>