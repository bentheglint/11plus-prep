  <rect x="218" y="205" width="26" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="244" y="80" width="26" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="244" y="105" width="26" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="244" y="130" width="26" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="244" y="155" width="26" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="244" y="180" width="26" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="244" y="205" width="26" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="270" y="80" width="26" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="270" y="105" width="26" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="270" y="130" width="26" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="270" y="155" width="26" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="270" y="180" width="26" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
  <rect x="270" y="205" width="26" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="3"/>
