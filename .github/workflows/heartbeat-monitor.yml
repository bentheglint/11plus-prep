# Heartbeat monitor — Layer 1 silent-failure defence.
#
# Every 6 hours, lists the freshest object under daily/ in B2 and alerts via
# Resend if it's older than 36h. Catches the failure mode where the daily-
# backup workflow stops running entirely (no error to alert on, just silence).
#
# Required GitHub secrets (subset of daily-backup's):
#   B2_KEY_ID, B2_APPLICATION_KEY, RESEND_API_KEY, RESEND_TO_EMAIL

name: Heartbeat monitor (Layer 1 silent-failure check)

on:
  schedule:
    - cron: '0 */6 * * *'  # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
      B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # No npm install needed — heartbeat uses only built-in fetch + b2/resend libs

      - name: Run heartbeat check
        run: node scripts/process-gates/heartbeat-monitor.mjs
