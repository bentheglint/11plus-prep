<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Title -->
  <text x="200" y="22" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Scale Model 1 : 50</text>

  <!-- Ground line -->
  <line x1="20" y1="265" x2="380" y2="265" stroke="#333" stroke-width="2"/>

  <!-- MODEL BUILDING (left side, small) -->
  <!-- Main building body -->
  <rect x="55" y="195" width="50" height="70" fill="#FFD180" stroke="#333" stroke-width="1.5"/>
  <!-- Roof -->
  <polygon points="45,195 80,155 115,195" fill="#B87333" stroke="#333" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="71" y="235" width="18" height="30" rx="2" ry="2" fill="#8B4513" stroke="#333" stroke-width="1"/>
  <!-- Windows -->
  <rect x="62" y="205" width="12" height="12" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <rect x="86" y="205" width="12" height="12" fill="#87CEEB" stroke="#333" stroke-width="1"/>

  <!-- Model height dimension line -->
  <line x1="35" y1="155" x2="35" y2="265" stroke="#D94A4A" stroke-width="1.5"/>
  <line x1="30" y1="155" x2="40" y2="155" stroke="#D94A4A" stroke-width="1.5"/>
  <line x1="30" y1="265" x2="40" y2="265" stroke="#D94A4A" stroke-width="1.5"/>
  <text x="33" y="215" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#D94A4A" transform="rotate(-90 33 215)">60 cm</text>

  <!-- "Model" label -->
  <text x="80" y="285" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">Model</text>

  <!-- Arrow between model and real building -->
  <text x="190" y="135" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">x 50</text>
  <line x1="140" y1="140" x2="240" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- REAL BUILDING (right side, large) -->
  <!-- Main building body -->
  <rect x="260" y="55" width="100" height="210" fill="#FFD180" stroke="#333" stroke-width="1.5"/>
  <!-- Roof -->
  <polygon points="245,55 310,30 375,55" fill="#B87333" stroke="#333" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="294" y="225" width="32" height="40" rx="3" ry="3" fill="#8B4513" stroke="#333" stroke-width="1"/>
  <!-- Windows - row 1 -->
  <rect x="272" y="70" width="22" height="22" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <rect x="326" y="70" width="22" height="22" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <!-- Windows - row 2 -->
  <rect x="272" y="110" width="22" height="22" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <rect x="326" y="110" width="22" height="22" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <!-- Windows - row 3 -->
  <rect x="272" y="150" width="22" height="22" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <rect x="326" y="150" width="22" height="22" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <!-- Windows - row 4 -->
  <rect x="272" y="190" width="22" height="22" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <rect x="326" y="190" width="22" height="22" fill="#87CEEB" stroke="#333" stroke-width="1"/>

  <!-- Real building height dimension line -->
  <line x1="375" y1="30" x2="375" y2="265" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="370" y1="30" x2="380" y2="30" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="370" y1="265" x2="380" y2="265" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="377" y="152" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#4A90D9" transform="rotate(-90 377 152)">? metres</text>

  <!-- "Real Building" label -->
  <text x="310" y="285" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">Real Building</text>

  <!-- Calculation hint -->
  <text x="200" y="160" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">60 cm x 50</text>
  <text x="200" y="175" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">= 3000 cm</text>
  <text x="200" y="190" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">= ? m</text>
</svg>