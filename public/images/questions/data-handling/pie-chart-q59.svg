<svg xmlns="http://www.w3.org/2000/svg" width="500" height="450" viewBox="0 0 500 450">
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="black">Time Spent in a Day</text>

  <!-- Slice 1: Sleep 120° (0° to 120°) -->
  <path d="M 250 225 L 250 125 A 100 100 0 0 1 336.6 275 Z" fill="lightskyblue" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 2: School 90° (120° to 210°) -->
  <path d="M 250 225 L 336.6 275 A 100 100 0 0 1 200 311.6 Z" fill="lightcoral" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 3: Play 90° (210° to 300°) -->
  <path d="M 250 225 L 200 311.6 A 100 100 0 0 1 163.4 175 Z" fill="lightgreen" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 4: Eating 60° (300° to 360°) -->
  <path d="M 250 225 L 163.4 175 A 100 100 0 0 1 250 125 Z" fill="lightyellow" fill-opacity="0.9" stroke="black" stroke-width="2"/>

  <!-- Label line 1: Sleep (mid 60°) -->
  <line x1="336.6" y1="175" x2="362.6" y2="160" stroke="gray" stroke-width="1"/>
  <text x="362.6" y="155" text-anchor="start" font-family="Arial" font-size="14" fill="black">Sleep</text>
  <text x="362.6" y="173" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">120°</text>

  <!-- Label line 2: School (mid 165°) -->
  <line x1="275.9" y1="321.6" x2="283.7" y2="350.6" stroke="gray" stroke-width="1"/>
  <text x="283.7" y="345.6" text-anchor="start" font-family="Arial" font-size="14" fill="black">School</text>
  <text x="283.7" y="363.6" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Label line 3: Play (mid 255°) -->
  <line x1="153.4" y1="250.9" x2="124.4" y2="258.7" stroke="gray" stroke-width="1"/>
  <text x="124.4" y="253.7" text-anchor="end" font-family="Arial" font-size="14" fill="black">Play</text>
  <text x="124.4" y="271.7" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Label line 4: Eating (mid 330°) -->
  <line x1="200" y1="138.4" x2="185" y2="112.4" stroke="gray" stroke-width="1"/>
  <text x="185" y="107.4" text-anchor="end" font-family="Arial" font-size="14" fill="black">Eating</text>
  <text x="185" y="125.4" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">60°</text>

  <!-- Center point -->
  <circle cx="250" cy="225" r="3" fill="black"/>
</svg>