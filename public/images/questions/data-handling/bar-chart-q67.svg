<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300">
  <!-- Title -->
  <text x="225" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">School Attendance</text>

  <!-- Y-axis -->
  <line x1="50" y1="50" x2="50" y2="250" stroke="black" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="50" y1="250" x2="440" y2="250" stroke="black" stroke-width="1"/>

  <!-- Horizontal gridlines -->
  <line x1="50" y1="217" x2="440" y2="217" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="183" x2="440" y2="183" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="150" x2="440" y2="150" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="117" x2="440" y2="117" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="83" x2="440" y2="83" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="50" x2="440" y2="50" stroke="#ddd" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="30" y="254" text-anchor="end" font-family="Arial" font-size="12">0</text>
  <text x="30" y="221" text-anchor="end" font-family="Arial" font-size="12">10</text>
  <text x="30" y="187" text-anchor="end" font-family="Arial" font-size="12">20</text>
  <text x="30" y="154" text-anchor="end" font-family="Arial" font-size="12">30</text>
  <text x="30" y="121" text-anchor="end" font-family="Arial" font-size="12">40</text>
  <text x="30" y="87" text-anchor="end" font-family="Arial" font-size="12">50</text>
  <text x="30" y="54" text-anchor="end" font-family="Arial" font-size="12">60</text>

  <!-- Y-axis ticks -->
  <line x1="47" y1="250" x2="50" y2="250" stroke="black" stroke-width="1"/>
  <line x1="47" y1="217" x2="50" y2="217" stroke="black" stroke-width="1"/>
  <line x1="47" y1="183" x2="50" y2="183" stroke="black" stroke-width="1"/>
  <line x1="47" y1="150" x2="50" y2="150" stroke="black" stroke-width="1"/>
  <line x1="47" y1="117" x2="50" y2="117" stroke="black" stroke-width="1"/>
  <line x1="47" y1="83" x2="50" y2="83" stroke="black" stroke-width="1"/>
  <line x1="47" y1="50" x2="50" y2="50" stroke="black" stroke-width="1"/>

  <!-- Bars -->
  <rect x="75" y="97" width="55" height="153" fill="lightskyblue" stroke="black" stroke-width="1"/>
  <rect x="150" y="83" width="55" height="167" fill="lightcoral" stroke="black" stroke-width="1"/>
  <rect x="225" y="70" width="55" height="180" fill="lightgreen" stroke="black" stroke-width="1"/>
  <rect x="300" y="77" width="55" height="173" fill="lightyellow" stroke="black" stroke-width="1"/>
  <rect x="375" y="57" width="55" height="193" fill="plum" fill-opacity="0.7" stroke="black" stroke-width="1"/>

  <!-- Value labels on bars -->
  <text x="102" y="90" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">46</text>
  <text x="177" y="76" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">50</text>
  <text x="252" y="63" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">54</text>
  <text x="327" y="70" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">52</text>
  <text x="402" y="50" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">58</text>

  <!-- Bar labels -->
  <text x="102" y="270" text-anchor="middle" font-family="Arial" font-size="12">Monday</text>
  <text x="177" y="270" text-anchor="middle" font-family="Arial" font-size="12">Tuesday</text>
  <text x="252" y="270" text-anchor="middle" font-family="Arial" font-size="12">Wednesday</text>
  <text x="327" y="270" text-anchor="middle" font-family="Arial" font-size="12">Thursday</text>
  <text x="402" y="270" text-anchor="middle" font-family="Arial" font-size="12">Friday</text>
