<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    text { font-family: Arial, sans-serif; fill: #333; }
  </style>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-size="16" font-weight="bold">Square Tile Patterns</text>
  <text x="200" y="48" text-anchor="middle" font-size="13" fill="#555">1, 4, 9, 16, ... ?</text>

  <!-- 1×1 = 1 tile -->
  <rect x="18" y="130" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <text x="30" y="176" text-anchor="middle" font-size="14" font-weight="bold">1</text>
  <text x="30" y="194" text-anchor="middle" font-size="11" fill="#666">1×1</text>

  <!-- 2×2 = 4 tiles -->
  <rect x="62" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="86" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="62" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="86" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <text x="86" y="186" text-anchor="middle" font-size="14" font-weight="bold">4</text>
  <text x="86" y="204" text-anchor="middle" font-size="11" fill="#666">2×2</text>

  <!-- 3×3 = 9 tiles -->
  <rect x="126" y="94" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="150" y="94" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="174" y="94" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="126" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="150" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="174" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="126" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="150" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="174" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <text x="162" y="186" text-anchor="middle" font-size="14" font-weight="bold">9</text>
  <text x="162" y="204" text-anchor="middle" font-size="11" fill="#666">3×3</text>

  <!-- 4×4 = 16 tiles -->
  <rect x="214" y="70" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="238" y="70" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="262" y="70" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="286" y="70" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="214" y="94" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="238" y="94" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="262" y="94" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="286" y="94" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="214" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="238" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="262" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="286" y="118" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="214" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="238" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="262" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="286" y="142" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <text x="262" y="186" text-anchor="middle" font-size="14" font-weight="bold">16</text>
  <text x="262" y="204" text-anchor="middle" font-size="11" fill="#666">4×4</text>

  <!-- ? for 5th (which would be 5x5=25 but question asks about 7th=49) -->
  <text x="356" y="130" text-anchor="middle" font-size="32" fill="red" font-weight="bold">?</text>
  <text x="356" y="186" text-anchor="middle" font-size="14" fill="red" font-weight="bold">?</text>
  <text x="356" y="204" text-anchor="middle" font-size="11" fill="#666">7×7</text>

  <!-- Bottom labels -->
  <text x="30" y="232" text-anchor="middle" font-size="12" fill="#888">1²</text>
  <text x="86" y="232" text-anchor="middle" font-size="12" fill="#888">2²</text>
  <text x="162" y="232" text-anchor="middle" font-size="12" fill="#888">3²</text>
  <text x="262" y="232" text-anchor="middle" font-size="12" fill="#888">4²</text>
  <text x="356" y="232" text-anchor="middle" font-size="12" fill="red">7²</text>

  <!-- Dots showing the pattern continues -->
  <text x="200" y="268" text-anchor="middle" font-size="13" fill="#888">1, 4, 9, 16, 25, 36, ?</text>
</svg>