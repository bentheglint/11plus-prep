<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Title -->
  <text x="200" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Andrew and Matthew share sweets 5 : 3</text>

  <!-- Total label -->
  <text x="200" y="55" font-family="Arial" font-size="14" text-anchor="middle" fill="#555">96 sweets</text>

  <!-- Bar model: 8 equal parts, each 42.5px wide -->
  <!-- Andrew: 5 parts (lightskyblue) -->
  <rect x="30" y="80" width="42.5" height="80" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <rect x="72.5" y="80" width="42.5" height="80" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <rect x="115" y="80" width="42.5" height="80" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <rect x="157.5" y="80" width="42.5" height="80" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <rect x="200" y="80" width="42.5" height="80" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>

  <!-- Matthew: 3 parts (lightcoral) -->
  <rect x="242.5" y="80" width="42.5" height="80" fill="#F08080" stroke="#333" stroke-width="1.5"/>
  <rect x="285" y="80" width="42.5" height="80" fill="#F08080" stroke="#333" stroke-width="1.5"/>
  <rect x="327.5" y="80" width="42.5" height="80" fill="#F08080" stroke="#333" stroke-width="1.5"/>

  <!-- Question marks inside each section -->
  <text x="51.25" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="93.75" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="136.25" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="178.75" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="221.25" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="263.75" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="306.25" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="348.75" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>

  <!-- Andrew bracket and label -->
  <line x1="30" y1="175" x2="30" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="190" x2="242.5" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="242.5" y1="175" x2="242.5" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="136.25" y="212" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#4A90D9">Andrew (5 parts)</text>

  <!-- Matthew bracket and label -->
  <line x1="242.5" y1="175" x2="242.5" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="242.5" y1="190" x2="370" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="370" y1="175" x2="370" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="306.25" y="212" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#D94A4A">Matthew (3 parts)</text>

  <!-- Total bracket at bottom -->
  <line x1="30" y1="235" x2="30" y2="250" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="250" x2="370" y2="250" stroke="#333" stroke-width="1.5"/>
  <line x1="370" y1="235" x2="370" y2="250" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="275" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Total = 96 sweets</text>
</svg>