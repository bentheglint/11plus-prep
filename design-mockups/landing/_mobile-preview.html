<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PrepStep landing - mobile preview</title>
<style>
  html, body { margin: 0; height: 100%; background: #1a1730; }
  .stage {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 0 48px;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
  }
  .label {
    color: #C4B5FD;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .phone {
    width: 390px;
    height: 844px;
    border: 12px solid #0f0d1c;
    border-radius: 44px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    overflow: hidden;
    background: #fff;
    position: relative;
  }
  .phone iframe {
    width: 390px;
    height: 844px;
    border: 0;
    display: block;
  }
  .notch {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 150px; height: 26px;
    background: #0f0d1c;
    border-bottom-left-radius: 16px;
    border-bottom-right-radius: 16px;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="label">iPhone-width preview &middot; 390px</div>
    <div class="phone">
      <div class="notch"></div>
      <iframe src="/landing-prepstep.html" title="PrepStep landing mobile"></iframe>
    </div>
  </div>
</body>
</html>
