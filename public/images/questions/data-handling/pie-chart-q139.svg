<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="black">Travel to School</text>

  <!-- Slice 1: Bus 108° (0° to 108°) -->
  <path d="M 200 210 L 200 80 A 130 130 0 0 1 323.6 250.2 Z" fill="lightskyblue" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 2: Car 54° (108° to 162°) -->
  <path d="M 200 210 L 323.6 250.2 A 130 130 0 0 1 240.2 333.6 Z" fill="lightcoral" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 3: Walk 90° (162° to 252°) -->
  <path d="M 200 210 L 240.2 333.6 A 130 130 0 0 1 76.4 250.2 Z" fill="lightgreen" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 4: Cycle 108° (252° to 360°) -->
  <path d="M 200 210 L 76.4 250.2 A 130 130 0 0 1 200 80 Z" fill="lightyellow" fill-opacity="0.9" stroke="black" stroke-width="2"/>

  <!-- Label line 1: Bus (mid 54°) -->
  <line x1="307.6" y1="131.8" x2="329.4" y2="116" stroke="gray" stroke-width="1"/>
  <text x="332" y="111" text-anchor="start" font-family="Arial" font-size="14" fill="black">Bus</text>
  <text x="332" y="129" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">108°</text>

  <!-- Label line 2: Car (mid 135°) -->
  <line x1="294" y1="304" x2="313.1" y2="323.1" stroke="gray" stroke-width="1"/>
  <text x="316" y="318" text-anchor="start" font-family="Arial" font-size="14" fill="black">Car</text>
  <text x="316" y="336" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">54°</text>

  <!-- Label line 3: Walk (mid 207°) -->
  <line x1="139.6" y1="328.5" x2="127.4" y2="352.6" stroke="gray" stroke-width="1"/>
  <text x="124" y="348" text-anchor="end" font-family="Arial" font-size="14" fill="black">Walk</text>
  <text x="124" y="366" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Label line 4: Cycle (mid 306°) -->
  <line x1="92.4" y1="131.8" x2="70.6" y2="116" stroke="gray" stroke-width="1"/>
  <text x="68" y="111" text-anchor="end" font-family="Arial" font-size="14" fill="black">Cycle</text>
  <text x="68" y="129" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">108°</text>

  <!-- Center point -->
  <circle cx="200" cy="210" r="3" fill="black"/>
</svg>