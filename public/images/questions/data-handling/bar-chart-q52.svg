<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Test Scores</text>

  <!-- Y-axis -->
  <line x1="50" y1="50" x2="50" y2="250" stroke="black" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="50" y1="250" x2="400" y2="250" stroke="black" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="30" y="254" text-anchor="end" font-family="Arial" font-size="12">0</text>
  <text x="30" y="221" text-anchor="end" font-family="Arial" font-size="12">10</text>
  <text x="30" y="187" text-anchor="end" font-family="Arial" font-size="12">20</text>
  <text x="30" y="154" text-anchor="end" font-family="Arial" font-size="12">30</text>
  <text x="30" y="121" text-anchor="end" font-family="Arial" font-size="12">40</text>
  <text x="30" y="87" text-anchor="end" font-family="Arial" font-size="12">50</text>
  <text x="30" y="54" text-anchor="end" font-family="Arial" font-size="12">60</text>

  <!-- Y-axis ticks -->
  <line x1="47" y1="250" x2="50" y2="250" stroke="black" stroke-width="1"/>
  <line x1="47" y1="217" x2="50" y2="217" stroke="black" stroke-width="1"/>
  <line x1="47" y1="183" x2="50" y2="183" stroke="black" stroke-width="1"/>
  <line x1="47" y1="150" x2="50" y2="150" stroke="black" stroke-width="1"/>
  <line x1="47" y1="117" x2="50" y2="117" stroke="black" stroke-width="1"/>
  <line x1="47" y1="83" x2="50" y2="83" stroke="black" stroke-width="1"/>
  <line x1="47" y1="50" x2="50" y2="50" stroke="black" stroke-width="1"/>

  <!-- Bars -->
  <rect x="80" y="100" width="60" height="150" fill="lightskyblue" stroke="black" stroke-width="1"/>
  <rect x="160" y="83" width="60" height="167" fill="lightcoral" stroke="black" stroke-width="1"/>
  <rect x="240" y="67" width="60" height="183" fill="lightgreen" stroke="black" stroke-width="1"/>
  <rect x="320" y="83" width="60" height="167" fill="lightyellow" stroke="black" stroke-width="1"/>

  <!-- Bar labels -->
  <text x="110" y="270" text-anchor="middle" font-family="Arial" font-size="12">Maths</text>
  <text x="190" y="270" text-anchor="middle" font-family="Arial" font-size="12">English</text>
  <text x="270" y="270" text-anchor="middle" font-family="Arial" font-size="12">Science</text>
  <text x="350" y="270" text-anchor="middle" font-family="Arial" font-size="12">History</text>
</svg>