<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300">
  <!-- Title -->
  <text x="225" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Daily Temperature (°C)</text>

  <!-- Y-axis -->
  <line x1="50" y1="50" x2="50" y2="250" stroke="black" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="50" y1="250" x2="430" y2="250" stroke="black" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="30" y="254" text-anchor="end" font-family="Arial" font-size="12">0</text>
  <text x="30" y="221" text-anchor="end" font-family="Arial" font-size="12">5</text>
  <text x="30" y="187" text-anchor="end" font-family="Arial" font-size="12">10</text>
  <text x="30" y="154" text-anchor="end" font-family="Arial" font-size="12">15</text>
  <text x="30" y="121" text-anchor="end" font-family="Arial" font-size="12">20</text>
  <text x="30" y="87" text-anchor="end" font-family="Arial" font-size="12">25</text>
  <text x="30" y="54" text-anchor="end" font-family="Arial" font-size="12">30</text>

  <!-- Y-axis gridlines -->
  <line x1="50" y1="217" x2="430" y2="217" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="183" x2="430" y2="183" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="150" x2="430" y2="150" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="117" x2="430" y2="117" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="83" x2="430" y2="83" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="50" x2="430" y2="50" stroke="#ddd" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="90" y="270" text-anchor="middle" font-family="Arial" font-size="12">Mon</text>
  <text x="170" y="270" text-anchor="middle" font-family="Arial" font-size="12">Tue</text>
  <text x="250" y="270" text-anchor="middle" font-family="Arial" font-size="12">Wed</text>
  <text x="330" y="270" text-anchor="middle" font-family="Arial" font-size="12">Thu</text>
  <text x="410" y="270" text-anchor="middle" font-family="Arial" font-size="12">Fri</text>

  <!-- Data line -->
  <polyline points="90,130 170,170 250,103 330,77 410,117" fill="none" stroke="red" stroke-width="2"/>

  <!-- Data points -->
  <circle cx="90" cy="130" r="4" fill="red"/>
  <circle cx="170" cy="170" r="4" fill="red"/>
  <circle cx="250" cy="103" r="4" fill="red"/>
  <circle cx="330" cy="77" r="4" fill="red"/>
  <circle cx="410" cy="117" r="4" fill="red"/>
</svg>