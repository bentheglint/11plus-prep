  <rect x="236" y="74" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="256" y="74" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="276" y="74" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="216" y="94" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="236" y="94" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="256" y="94" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="276" y="94" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="216" y="114" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="236" y="114" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="256" y="114" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="276" y="114" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="216" y="134" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="236" y="134" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="256" y="134" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="276" y="134" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="216" y="154" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="236" y="154" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="256" y="154" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="276" y="154" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
