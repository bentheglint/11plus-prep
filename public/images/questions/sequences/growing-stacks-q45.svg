  <text x="257" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">18</text>

  <!-- Week 4: 24 blocks (4 columns of 6) -->
  <rect x="316" y="80" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="316" y="105" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="316" y="130" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="316" y="155" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="316" y="180" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="316" y="205" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="334" y="80" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="334" y="105" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="334" y="130" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="334" y="155" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="334" y="180" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="334" y="205" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="80" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="105" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="130" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="155" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="180" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="205" width="18" height="25" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="370" y="80" width="18" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="370" y="105" width="18" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="370" y="130" width="18" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="370" y="155" width="18" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="370" y="180" width="18" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="370" y="205" width="18" height="25" fill="#6BB3D9" stroke="black" stroke-width="1.5" rx="2"/>
  <text x="361" y="248" text-anchor="middle" font-size="13" font-weight="bold">Week 4</text>
  <text x="361" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">24</text>

  <!-- +6 arrows -->
  <text x="96" y="68" text-anchor="middle" font-size="12" fill="red" font-weight="bold">+6</text>
  <text x="204" y="68" text-anchor="middle" font-size="12" fill="red" font-weight="bold">+6</text>
  <text x="310" y="68" text-anchor="middle" font-size="12" fill="red" font-weight="bold">+6</text>
