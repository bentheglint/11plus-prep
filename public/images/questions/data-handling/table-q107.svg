<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg">
  <text x="200" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Survey Responses</text>
  <rect x="50" y="50" width="100" height="40" fill="lightblue" stroke="black" stroke-width="1"/>
  <text x="100" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Response</text>
  <rect x="150" y="50" width="100" height="40" fill="lightblue" stroke="black" stroke-width="1"/>
  <text x="200" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Boys</text>
  <rect x="250" y="50" width="100" height="40" fill="lightblue" stroke="black" stroke-width="1"/>
  <text x="300" y="75" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">Girls</text>
  <rect x="50" y="90" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="100" y="115" text-anchor="middle" font-family="Arial" font-size="14">Yes</text>
  <rect x="150" y="90" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="200" y="115" text-anchor="middle" font-family="Arial" font-size="14">28</text>
  <rect x="250" y="90" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="300" y="115" text-anchor="middle" font-family="Arial" font-size="14">28</text>
  <rect x="50" y="130" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-family="Arial" font-size="14">No</text>
  <rect x="150" y="130" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="200" y="155" text-anchor="middle" font-family="Arial" font-size="14">18</text>
  <rect x="250" y="130" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="300" y="155" text-anchor="middle" font-family="Arial" font-size="14">16</text>
  <rect x="50" y="170" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="100" y="195" text-anchor="middle" font-family="Arial" font-size="14">Maybe</text>
  <rect x="150" y="170" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="200" y="195" text-anchor="middle" font-family="Arial" font-size="14">8</text>
  <rect x="250" y="170" width="100" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="300" y="195" text-anchor="middle" font-family="Arial" font-size="14">12</text>
</svg>