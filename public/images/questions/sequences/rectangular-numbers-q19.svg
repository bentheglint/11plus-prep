  <circle cx="98" cy="110" r="4" fill="#333"/>
  <circle cx="74" cy="134" r="4" fill="#333"/>
  <circle cx="98" cy="134" r="4" fill="#333"/>
  <circle cx="74" cy="158" r="4" fill="#333"/>
  <circle cx="98" cy="158" r="4" fill="#333"/>
  <text x="86" y="192" text-anchor="middle" font-size="14" font-weight="bold">6</text>
  <text x="86" y="210" text-anchor="middle" font-size="11" fill="#666">2×3</text>

  <!-- 3×4 = 12 -->
  <rect x="130" y="86" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="152" y="86" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="174" y="86" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="130" y="108" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="152" y="108" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="174" y="108" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="130" y="130" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="152" y="130" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="174" y="130" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="130" y="152" width="22" height="22" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
