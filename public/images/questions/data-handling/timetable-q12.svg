<svg width="550" height="280" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="275" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="black" font-weight="bold">Bus Timetable</text>

  <!-- Table outline -->
  <rect x="50" y="60" width="450" height="180" fill="none" stroke="black" stroke-width="2"/>

  <!-- Header row background -->
  <rect x="50" y="60" width="450" height="40" fill="lightblue" stroke="black" stroke-width="1"/>

  <!-- Column dividers -->
  <line x1="162.5" y1="60" x2="162.5" y2="240" stroke="black" stroke-width="1"/>
  <line x1="275" y1="60" x2="275" y2="240" stroke="black" stroke-width="1"/>
  <line x1="387.5" y1="60" x2="387.5" y2="240" stroke="black" stroke-width="1"/>

  <!-- Row dividers - EVENLY SPACED 35px apart -->
  <line x1="50" y1="100" x2="500" y2="100" stroke="black" stroke-width="1"/>
  <line x1="50" y1="135" x2="500" y2="135" stroke="black" stroke-width="1"/>
  <line x1="50" y1="170" x2="500" y2="170" stroke="black" stroke-width="1"/>
  <line x1="50" y1="205" x2="500" y2="205" stroke="black" stroke-width="1"/>

  <!-- Header text -->
  <text x="106" y="85" text-anchor="middle" font-family="Arial" font-size="14" fill="black" font-weight="bold">Main Station</text>
  <text x="219" y="85" text-anchor="middle" font-family="Arial" font-size="14" fill="black" font-weight="bold">High Street</text>
  <text x="331" y="85" text-anchor="middle" font-family="Arial" font-size="14" fill="black" font-weight="bold">Park Street</text>
  <text x="444" y="85" text-anchor="middle" font-family="Arial" font-size="14" fill="black" font-weight="bold">Shopping Centre</text>

  <!-- Row 1: 10:00 departure -->
  <text x="106" y="122" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">10:00</text>
  <text x="219" y="122" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">10:10</text>
  <text x="331" y="122" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">10:15</text>
  <text x="444" y="122" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">10:25</text>

  <!-- Row 2: 10:30 departure - ANSWER ROW -->
  <text x="106" y="157" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">10:30</text>
  <text x="219" y="157" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">10:40</text>
  <text x="331" y="157" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">10:45</text>
  <text x="444" y="157" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">10:55</text>

  <!-- Row 3: 11:00 departure -->
  <text x="106" y="192" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">11:00</text>
  <text x="219" y="192" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">11:10</text>
  <text x="331" y="192" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">11:15</text>
  <text x="444" y="192" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">11:25</text>

  <!-- Row 4: 11:30 departure -->
  <text x="106" y="227" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">11:30</text>
  <text x="219" y="227" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">11:40</text>
  <text x="331" y="227" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">11:45</text>
  <text x="444" y="227" text-anchor="middle" font-family="Arial" font-size="14" fill="dimgray">11:55</text>
</svg>
