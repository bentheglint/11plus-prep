<svg width="500" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="black" font-weight="bold">Oliver's Time Spent on Activities</text>

  <!-- Homework 90 degrees -->
  <path d="M 250 225 L 250.0 125.0 A 100 100 0 0 1 350.0 225.0 Z" fill="lightyellow" fill-opacity="0.9" stroke="black" stroke-width="2"/>
  <line x1="320.7" y1="154.3" x2="341.9" y2="133.1" stroke="gray" stroke-width="1"/>
  <text x="341.9" y="128.1" text-anchor="start" font-family="Arial" font-size="14" fill="black">Homework</text>
  <text x="341.9" y="146.1" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Playing 108 degrees -->
  <path d="M 250 225 L 350.0 225.0 A 100 100 0 0 1 219.1 320.1 Z" fill="lightcoral" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <line x1="308.8" y1="305.9" x2="326.4" y2="330.2" stroke="gray" stroke-width="1"/>
  <text x="326.4" y="325.2" text-anchor="start" font-family="Arial" font-size="14" fill="black">Playing</text>
  <text x="326.4" y="343.2" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">108°</text>

  <!-- Eating 72 degrees -->
  <path d="M 250 225 L 219.1 320.1 A 100 100 0 0 1 150.0 225.0 Z" fill="lightskyblue" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <line x1="169.1" y1="283.8" x2="144.8" y2="301.4" stroke="gray" stroke-width="1"/>
  <text x="144.8" y="296.4" text-anchor="end" font-family="Arial" font-size="14" fill="black">Eating</text>
  <text x="144.8" y="314.4" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">72°</text>

  <!-- Sleeping 54 degrees -->
  <path d="M 250 225 L 150.0 225.0 A 100 100 0 0 1 191.2 144.1 Z" fill="lightgreen" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <line x1="160.9" y1="179.6" x2="134.2" y2="166.0" stroke="gray" stroke-width="1"/>
  <text x="134.2" y="161.0" text-anchor="end" font-family="Arial" font-size="14" fill="black">Sleeping</text>
  <text x="134.2" y="179.0" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">54°</text>

  <!-- Reading 36 degrees -->
  <path d="M 250 225 L 191.2 144.1 A 100 100 0 0 1 250.0 125.0 Z" fill="plum" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <line x1="219.1" y1="129.9" x2="209.8" y2="101.4" stroke="gray" stroke-width="1"/>
  <text x="209.8" y="96.4" text-anchor="end" font-family="Arial" font-size="14" fill="black">Reading</text>
  <text x="209.8" y="114.4" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">36°</text>

  <!-- Center point -->
  <circle cx="250" cy="225" r="3" fill="black"/>
</svg>
