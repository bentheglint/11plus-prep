<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    text { font-family: Arial, sans-serif; fill: #333; }
  </style>

  <!-- 1×1 = 1 dot -->
  <circle cx="22" cy="120" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="22" y="160" text-anchor="middle" font-size="14" font-weight="bold">1</text>
  <text x="22" y="178" text-anchor="middle" font-size="11" fill="#666">1×1</text>

  <!-- 2×2 = 4 dots -->
  <circle cx="62" cy="110" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="82" cy="110" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="62" cy="130" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="82" cy="130" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="72" y="160" text-anchor="middle" font-size="14" font-weight="bold">4</text>
  <text x="72" y="178" text-anchor="middle" font-size="11" fill="#666">2×2</text>

  <!-- 3×3 = 9 dots -->
  <circle cx="112" cy="100" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="132" cy="100" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="152" cy="100" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="112" cy="120" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="132" cy="120" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="152" cy="120" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="112" cy="140" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="132" cy="140" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="152" cy="140" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="132" y="168" text-anchor="middle" font-size="14" font-weight="bold">9</text>
  <text x="132" y="186" text-anchor="middle" font-size="11" fill="#666">3×3</text>

  <!-- 4×4 = 16 dots -->
  <circle cx="182" cy="90" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="202" cy="90" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="222" cy="90" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="242" cy="90" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="182" cy="110" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="202" cy="110" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="222" cy="110" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="242" cy="110" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="182" cy="130" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="202" cy="130" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="222" cy="130" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="242" cy="130" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="182" cy="150" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="202" cy="150" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="222" cy="150" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="242" cy="150" r="9" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="212" y="178" text-anchor="middle" font-size="14" font-weight="bold">16</text>
  <text x="212" y="196" text-anchor="middle" font-size="11" fill="#666">4×4</text>

  <!-- 5×5 = 25 dots -->
  <circle cx="272" cy="80" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="290" cy="80" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="308" cy="80" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="326" cy="80" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="344" cy="80" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="272" cy="98" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="290" cy="98" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="308" cy="98" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="326" cy="98" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="344" cy="98" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="272" cy="116" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="290" cy="116" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="308" cy="116" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="326" cy="116" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="344" cy="116" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="272" cy="134" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="290" cy="134" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="308" cy="134" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="326" cy="134" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="344" cy="134" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="272" cy="152" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="290" cy="152" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="308" cy="152" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="326" cy="152" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="344" cy="152" r="8" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="308" y="180" text-anchor="middle" font-size="14" font-weight="bold">25</text>
  <text x="308" y="198" text-anchor="middle" font-size="11" fill="#666">5×5</text>

  <!-- ? for 6th -->
  <text x="388" y="130" text-anchor="middle" font-size="28" fill="red" font-weight="bold">?</text>
  <text x="388" y="158" text-anchor="middle" font-size="11" fill="#666">6×6</text>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-size="16" font-weight="bold">Square Numbers</text>
  <text x="200" y="48" text-anchor="middle" font-size="13" fill="#555">1, 4, 9, 16, 25, ?</text>

  <!-- Arrows between groups -->
  <text x="42" y="230" text-anchor="middle" font-size="12" fill="#888">1²</text>
  <text x="102" y="230" text-anchor="middle" font-size="12" fill="#888">2²</text>
  <text x="162" y="230" text-anchor="middle" font-size="12" fill="#888">3²</text>
  <text x="232" y="230" text-anchor="middle" font-size="12" fill="#888">4²</text>
  <text x="318" y="230" text-anchor="middle" font-size="12" fill="#888">5²</text>
  <text x="388" y="230" text-anchor="middle" font-size="12" fill="red">6²</text>
</svg>