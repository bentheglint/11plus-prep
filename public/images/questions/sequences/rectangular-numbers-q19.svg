  <text x="200" y="48" text-anchor="middle" font-size="13" fill="#555">2, 6, 12, 20, ?, 42</text>

  <!-- 1×2 = 2 -->
  <rect x="16" y="110" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="16" y="134" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <!-- Dots inside -->
  <circle cx="28" cy="122" r="4" fill="#333"/>
  <circle cx="28" cy="146" r="4" fill="#333"/>
  <text x="28" y="180" text-anchor="middle" font-size="14" font-weight="bold">2</text>
  <text x="28" y="198" text-anchor="middle" font-size="11" fill="#666">1×2</text>

  <!-- 2×3 = 6 -->
  <rect x="62" y="98" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="86" y="98" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="62" y="122" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="86" y="122" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="62" y="146" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="86" y="146" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <!-- Dots inside -->
