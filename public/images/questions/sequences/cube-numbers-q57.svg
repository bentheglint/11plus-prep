<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    text { font-family: Arial, sans-serif; fill: #333; }
  </style>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-size="16" font-weight="bold">Cube Numbers</text>
  <text x="200" y="48" text-anchor="middle" font-size="13" fill="#555">1, 8, 27, ...</text>

  <!-- 1×1×1 cube (single cube) -->
  <!-- Front face -->
  <polygon points="30,170 70,170 70,130 30,130" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <!-- Top face -->
  <polygon points="30,130 70,130 90,110 50,110" fill="#A8D8EA" stroke="black" stroke-width="1.5"/>
  <!-- Right face -->
  <polygon points="70,130 90,110 90,150 70,170" fill="#6BB3D9" stroke="black" stroke-width="1.5"/>
  <text x="55" y="196" text-anchor="middle" font-size="15" font-weight="bold">1</text>
  <text x="55" y="214" text-anchor="middle" font-size="11" fill="#666">1x1x1</text>

  <!-- 2×2×2 cube -->
  <!-- Back layer visible cubes - top row -->
  <!-- Front face - bottom-left -->
  <polygon points="125,190 160,190 160,155 125,155" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <!-- Front face - bottom-right -->
  <polygon points="160,190 195,190 195,155 160,155" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <!-- Front face - top-left -->
  <polygon points="125,155 160,155 160,120 125,120" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <!-- Front face - top-right -->
  <polygon points="160,155 195,155 195,120 160,120" fill="#87CEEB" stroke="black" stroke-width="1"/>

  <!-- Top face -->
  <polygon points="125,120 195,120 225,90 155,90" fill="#A8D8EA" stroke="black" stroke-width="1"/>
  <!-- Top grid line -->
  <line x1="160" y1="120" x2="190" y2="90" stroke="black" stroke-width="1"/>
  <!-- Top horizontal line -->
  <line x1="155" y1="105" x2="225" y2="105" stroke="black" stroke-width="1"/>

  <!-- Right face -->
  <polygon points="195,120 225,90 225,160 195,190" fill="#6BB3D9" stroke="black" stroke-width="1"/>
  <!-- Right grid line -->
  <line x1="195" y1="155" x2="225" y2="125" stroke="black" stroke-width="1"/>
  <!-- Right vertical line -->
  <line x1="210" y1="105" x2="210" y2="175" stroke="black" stroke-width="1"/>

  <!-- Outer border -->
  <polygon points="125,190 195,190 225,160 225,90 155,90 125,120" fill="none" stroke="black" stroke-width="1.5"/>

  <text x="172" y="216" text-anchor="middle" font-size="15" font-weight="bold">8</text>
  <text x="172" y="234" text-anchor="middle" font-size="11" fill="#666">2x2x2</text>

  <!-- 3×3×3 cube -->
  <!-- Front face - 3x3 grid -->
  <rect x="258" y="160" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <rect x="290" y="160" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <rect x="322" y="160" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <rect x="258" y="128" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <rect x="290" y="128" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <rect x="322" y="128" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <rect x="258" y="96" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <rect x="290" y="96" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>
  <rect x="322" y="96" width="32" height="32" fill="#87CEEB" stroke="black" stroke-width="1"/>

  <!-- Top face - parallelogram with 3 rows -->
  <polygon points="258,96 354,96 384,68 288,68" fill="#A8D8EA" stroke="black" stroke-width="1"/>
  <!-- Top grid lines (vertical going back) -->
  <line x1="290" y1="96" x2="320" y2="68" stroke="black" stroke-width="1"/>
  <line x1="322" y1="96" x2="352" y2="68" stroke="black" stroke-width="1"/>
  <!-- Top grid lines (horizontal rows) -->
  <line x1="268" y1="87" x2="374" y2="87" stroke="black" stroke-width="0.8" stroke-dasharray="none"/>
  <line x1="278" y1="78" x2="384" y2="78" stroke="black" stroke-width="0.8"/>

  <!-- Right face - parallelogram with 3 columns -->
  <polygon points="354,96 384,68 384,164 354,192" fill="#6BB3D9" stroke="black" stroke-width="1"/>
  <!-- Right grid lines (horizontal going back) -->
  <line x1="354" y1="128" x2="384" y2="100" stroke="black" stroke-width="1"/>
  <line x1="354" y1="160" x2="384" y2="132" stroke="black" stroke-width="1"/>
  <!-- Right grid lines (vertical) -->
  <line x1="364" y1="87" x2="364" y2="183" stroke="black" stroke-width="0.8"/>
  <line x1="374" y1="78" x2="374" y2="174" stroke="black" stroke-width="0.8"/>

  <!-- Outer border -->
  <polygon points="258,192 354,192 384,164 384,68 288,68 258,96" fill="none" stroke="black" stroke-width="1.5"/>

  <text x="318" y="218" text-anchor="middle" font-size="15" font-weight="bold">27</text>
  <text x="318" y="236" text-anchor="middle" font-size="11" fill="#666">3x3x3</text>

  <!-- Bottom pattern labels -->
  <text x="55" y="248" text-anchor="middle" font-size="12" fill="#888">1&#179;</text>
  <text x="172" y="260" text-anchor="middle" font-size="12" fill="#888">2&#179;</text>
  <text x="318" y="260" text-anchor="middle" font-size="12" fill="#888">3&#179;</text>

  <!-- Bottom text -->
  <text x="200" y="286" text-anchor="middle" font-size="12" fill="#555">1, 8, 27, 64, 125, ?</text>
</svg>