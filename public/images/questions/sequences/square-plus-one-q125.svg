<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    text { font-family: Arial, sans-serif; fill: #333; }
  </style>

  <!-- Title -->
  <text x="200" y="24" text-anchor="middle" font-size="16" font-weight="bold">Square + 1 Pattern</text>
  <text x="200" y="44" text-anchor="middle" font-size="13" fill="#555">n&#178; + 1: 2, 5, 10, 17, ...</text>

  <!-- 1×1 + 1 = 2 -->
  <!-- 1x1 square grid -->
  <rect x="20" y="120" width="28" height="28" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <circle cx="34" cy="134" r="5" fill="#333"/>
  <!-- +1 extra dot -->
  <circle cx="60" cy="134" r="8" fill="#FF9999" stroke="black" stroke-width="1.5"/>
  <text x="60" y="137" text-anchor="middle" font-size="9" fill="#333">+1</text>
  <text x="42" y="172" text-anchor="middle" font-size="15" font-weight="bold">2</text>
  <text x="42" y="190" text-anchor="middle" font-size="11" fill="#666">1&#178;+1</text>

  <!-- 2×2 + 1 = 5 -->
  <!-- 2x2 square grid -->
  <rect x="88" y="104" width="28" height="28" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="116" y="104" width="28" height="28" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="88" y="132" width="28" height="28" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="116" y="132" width="28" height="28" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <circle cx="102" cy="118" r="5" fill="#333"/>
  <circle cx="130" cy="118" r="5" fill="#333"/>
  <circle cx="102" cy="146" r="5" fill="#333"/>
  <circle cx="130" cy="146" r="5" fill="#333"/>
  <!-- +1 extra dot -->
  <circle cx="156" cy="132" r="8" fill="#FF9999" stroke="black" stroke-width="1.5"/>
  <text x="156" y="135" text-anchor="middle" font-size="9" fill="#333">+1</text>
  <text x="120" y="180" text-anchor="middle" font-size="15" font-weight="bold">5</text>
  <text x="120" y="198" text-anchor="middle" font-size="11" fill="#666">2&#178;+1</text>

  <!-- 3×3 + 1 = 10 -->
  <!-- 3x3 square grid -->
  <rect x="182" y="82" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="206" y="82" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="230" y="82" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="182" y="106" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="206" y="106" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="230" y="106" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="182" y="130" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="206" y="130" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="230" y="130" width="24" height="24" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <circle cx="194" cy="94" r="4" fill="#333"/>
  <circle cx="218" cy="94" r="4" fill="#333"/>
  <circle cx="242" cy="94" r="4" fill="#333"/>
  <circle cx="194" cy="118" r="4" fill="#333"/>
  <circle cx="218" cy="118" r="4" fill="#333"/>
  <circle cx="242" cy="118" r="4" fill="#333"/>
  <circle cx="194" cy="142" r="4" fill="#333"/>
  <circle cx="218" cy="142" r="4" fill="#333"/>
  <circle cx="242" cy="142" r="4" fill="#333"/>
  <!-- +1 extra dot -->
  <circle cx="266" cy="118" r="8" fill="#FF9999" stroke="black" stroke-width="1.5"/>
  <text x="266" y="121" text-anchor="middle" font-size="9" fill="#333">+1</text>
  <text x="224" y="176" text-anchor="middle" font-size="15" font-weight="bold">10</text>
  <text x="224" y="194" text-anchor="middle" font-size="11" fill="#666">3&#178;+1</text>

  <!-- 4×4 + 1 = 17 -->
  <!-- 4x4 square grid -->
  <rect x="292" y="64" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="312" y="64" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="332" y="64" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="64" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="292" y="84" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="312" y="84" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="332" y="84" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="84" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="292" y="104" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="312" y="104" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="332" y="104" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="104" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="292" y="124" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="312" y="124" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="332" y="124" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <rect x="352" y="124" width="20" height="20" fill="#87CEEB" stroke="black" stroke-width="1.5" rx="2"/>
  <circle cx="302" cy="74" r="3.5" fill="#333"/>
  <circle cx="322" cy="74" r="3.5" fill="#333"/>
  <circle cx="342" cy="74" r="3.5" fill="#333"/>
  <circle cx="362" cy="74" r="3.5" fill="#333"/>
  <circle cx="302" cy="94" r="3.5" fill="#333"/>
  <circle cx="322" cy="94" r="3.5" fill="#333"/>
  <circle cx="342" cy="94" r="3.5" fill="#333"/>
  <circle cx="362" cy="94" r="3.5" fill="#333"/>
  <circle cx="302" cy="114" r="3.5" fill="#333"/>
  <circle cx="322" cy="114" r="3.5" fill="#333"/>
  <circle cx="342" cy="114" r="3.5" fill="#333"/>
  <circle cx="362" cy="114" r="3.5" fill="#333"/>
  <circle cx="302" cy="134" r="3.5" fill="#333"/>
  <circle cx="322" cy="134" r="3.5" fill="#333"/>
  <circle cx="342" cy="134" r="3.5" fill="#333"/>
  <circle cx="362" cy="134" r="3.5" fill="#333"/>
  <!-- +1 extra dot -->
  <circle cx="384" cy="104" r="8" fill="#FF9999" stroke="black" stroke-width="1.5"/>
  <text x="384" y="107" text-anchor="middle" font-size="9" fill="#333">+1</text>
  <text x="338" y="166" text-anchor="middle" font-size="15" font-weight="bold">17</text>
  <text x="338" y="184" text-anchor="middle" font-size="11" fill="#666">4&#178;+1</text>

  <!-- Difference labels at bottom -->
  <text x="80" y="224" text-anchor="middle" font-size="12" fill="#888">+3</text>
  <text x="172" y="224" text-anchor="middle" font-size="12" fill="#888">+5</text>
  <text x="280" y="224" text-anchor="middle" font-size="12" fill="#888">+7</text>

  <!-- Key -->
  <rect x="90" y="250" width="14" height="14" fill="#87CEEB" stroke="black" stroke-width="1" rx="2"/>
  <text x="112" y="262" font-size="11" fill="#666">= n&#178; (square grid)</text>
  <circle cx="217" cy="257" r="7" fill="#FF9999" stroke="black" stroke-width="1"/>
  <text x="232" y="262" font-size="11" fill="#666">= the extra +1</text>

  <!-- Bottom text -->
  <text x="200" y="288" text-anchor="middle" font-size="12" fill="#555">Differences grow by 2 each time: +3, +5, +7, +9, ...</text>
</svg>