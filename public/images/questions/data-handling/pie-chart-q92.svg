<svg xmlns="http://www.w3.org/2000/svg" width="500" height="450" viewBox="0 0 500 450">
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="black">Favourite Colours</text>

  <!-- Slice 1: Blue 90° (0° to 90°) -->
  <path d="M 250 225 L 250 125 A 100 100 0 0 1 350 225 Z" fill="lightskyblue" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 2: Red 108° (90° to 198°) -->
  <path d="M 250 225 L 350 225 A 100 100 0 0 1 219.1 320.1 Z" fill="lightcoral" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 3: Green 72° (198° to 270°) -->
  <path d="M 250 225 L 219.1 320.1 A 100 100 0 0 1 150 225 Z" fill="lightgreen" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 4: Yellow 90° (270° to 360°) -->
  <path d="M 250 225 L 150 225 A 100 100 0 0 1 250 125 Z" fill="lightyellow" fill-opacity="0.9" stroke="black" stroke-width="2"/>

  <!-- Label line 1: Blue (mid 45°) -->
  <line x1="320.7" y1="154.3" x2="341.9" y2="133.1" stroke="gray" stroke-width="1"/>
  <text x="341.9" y="128.1" text-anchor="start" font-family="Arial" font-size="14" fill="black">Blue</text>
  <text x="341.9" y="146.1" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Label line 2: Red (mid 144°) -->
  <line x1="308.8" y1="305.9" x2="326.4" y2="330.2" stroke="gray" stroke-width="1"/>
  <text x="326.4" y="325.2" text-anchor="start" font-family="Arial" font-size="14" fill="black">Red</text>
  <text x="326.4" y="343.2" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">108°</text>

  <!-- Label line 3: Green (mid 234°) -->
  <line x1="169.1" y1="283.8" x2="144.8" y2="301.4" stroke="gray" stroke-width="1"/>
  <text x="144.8" y="296.4" text-anchor="end" font-family="Arial" font-size="14" fill="black">Green</text>
  <text x="144.8" y="314.4" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">72°</text>

  <!-- Label line 4: Yellow (mid 315°) -->
  <line x1="179.3" y1="154.3" x2="158.1" y2="133.1" stroke="gray" stroke-width="1"/>
  <text x="158.1" y="128.1" text-anchor="end" font-family="Arial" font-size="14" fill="black">Yellow</text>
  <text x="158.1" y="146.1" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Center point -->
  <circle cx="250" cy="225" r="3" fill="black"/>
</svg>