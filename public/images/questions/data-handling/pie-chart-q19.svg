<svg width="500" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="black" font-weight="bold">Favorite Sports</text>

  <!-- Football 120 degrees -->
  <path d="M 250 225 L 250.0 125.0 A 100 100 0 0 1 336.6 275.0 Z" fill="lightcoral" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <line x1="336.6" y1="175.0" x2="362.6" y2="160.0" stroke="gray" stroke-width="1"/>
  <text x="362.6" y="155.0" text-anchor="start" font-family="Arial" font-size="14" fill="black">Football</text>
  <text x="362.6" y="173.0" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">120°</text>

  <!-- Basketball 90 degrees -->
  <path d="M 250 225 L 336.6 275.0 A 100 100 0 0 1 200.0 311.6 Z" fill="lightskyblue" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <line x1="275.9" y1="321.6" x2="283.6" y2="350.6" stroke="gray" stroke-width="1"/>
  <text x="283.6" y="345.6" text-anchor="start" font-family="Arial" font-size="14" fill="black">Basketball</text>
  <text x="283.6" y="363.6" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Swimming 72 degrees -->
  <path d="M 250 225 L 200.0 311.6 A 100 100 0 0 1 152.2 204.2 Z" fill="lightgreen" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <line x1="158.6" y1="265.7" x2="131.2" y2="277.9" stroke="gray" stroke-width="1"/>
  <text x="131.2" y="272.9" text-anchor="end" font-family="Arial" font-size="14" fill="black">Swimming</text>
  <text x="131.2" y="290.9" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">72°</text>

  <!-- Tennis 54 degrees -->
  <path d="M 250 225 L 152.2 204.2 A 100 100 0 0 1 209.3 133.6 Z" fill="lightyellow" fill-opacity="0.9" stroke="black" stroke-width="2"/>
  <line x1="172.3" y1="162.1" x2="149.0" y2="143.2" stroke="gray" stroke-width="1"/>
  <text x="149.0" y="138.2" text-anchor="end" font-family="Arial" font-size="14" fill="black">Tennis</text>
  <text x="149.0" y="156.2" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">54°</text>

  <!-- Rugby 24 degrees -->
  <path d="M 250 225 L 209.3 133.6 A 100 100 0 0 1 250.0 125.0 Z" fill="plum" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <line x1="229.2" y1="127.2" x2="223.0" y2="97.8" stroke="gray" stroke-width="1"/>
  <text x="223.0" y="92.8" text-anchor="end" font-family="Arial" font-size="14" fill="black">Rugby</text>
  <text x="223.0" y="110.8" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">24°</text>

  <!-- Center point -->
  <circle cx="250" cy="225" r="3" fill="black"/>
</svg>
