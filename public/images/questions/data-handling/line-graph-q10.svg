<svg width="450" height="300" xmlns="http://www.w3.org/2000/svg">
  <text x="225" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Temperature During the Day</text>
  <line x1="50" y1="50" x2="50" y2="250" stroke="black" stroke-width="2"/>
  <line x1="50" y1="250" x2="420" y2="250" stroke="black" stroke-width="2"/>
  <text x="30" y="255" font-family="Arial" font-size="12">0</text>
  <text x="25" y="210" font-family="Arial" font-size="12">10</text>
  <text x="25" y="170" font-family="Arial" font-size="12">15</text>
  <text x="25" y="130" font-family="Arial" font-size="12">20</text>
  <text x="25" y="90" font-family="Arial" font-size="12">25</text>
  <text x="25" y="50" font-family="Arial" font-size="12">30</text>
  <text x="70" y="270" text-anchor="middle" font-family="Arial" font-size="12">9am</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial" font-size="12">12pm</text>
  <text x="230" y="270" text-anchor="middle" font-family="Arial" font-size="12">3pm</text>
  <text x="310" y="270" text-anchor="middle" font-family="Arial" font-size="12">6pm</text>
  <text x="390" y="270" text-anchor="middle" font-family="Arial" font-size="12">9pm</text>
  <polyline points="70,170 150,130 230,90 310,130 390,170" fill="none" stroke="blue" stroke-width="2"/>
  <circle cx="70" cy="170" r="4" fill="blue"/>
  <circle cx="150" cy="130" r="4" fill="blue"/>
  <circle cx="230" cy="90" r="4" fill="blue"/>
  <circle cx="310" cy="130" r="4" fill="blue"/>
  <circle cx="390" cy="170" r="4" fill="blue"/>
</svg>
