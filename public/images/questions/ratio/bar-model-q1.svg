<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Title -->
  <text x="200" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Ratio of Boys to Girls = 3 : 2</text>

  <!-- Total label -->
  <text x="200" y="55" font-family="Arial" font-size="14" text-anchor="middle" fill="#555">30 children total</text>

  <!-- Bar model: 5 equal parts, each 68px wide -->
  <!-- Boys: 3 parts (lightskyblue) -->
  <rect x="30" y="80" width="68" height="80" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <rect x="98" y="80" width="68" height="80" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
  <rect x="166" y="80" width="68" height="80" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>

  <!-- Girls: 2 parts (lightcoral) -->
  <rect x="234" y="80" width="68" height="80" fill="#F08080" stroke="#333" stroke-width="1.5"/>
  <rect x="302" y="80" width="68" height="80" fill="#F08080" stroke="#333" stroke-width="1.5"/>

  <!-- Question marks inside sections -->
  <text x="64" y="128" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="132" y="128" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="200" y="128" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="268" y="128" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="336" y="128" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#555">?</text>

  <!-- Boys bracket and label -->
  <line x1="30" y1="175" x2="30" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="190" x2="234" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="234" y1="175" x2="234" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="132" y="212" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#4A90D9">Boys (3 parts)</text>

  <!-- Girls bracket and label -->
  <line x1="234" y1="175" x2="234" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="234" y1="190" x2="370" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="370" y1="175" x2="370" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="302" y="212" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#D94A4A">Girls (2 parts)</text>

  <!-- Total bracket at bottom -->
  <line x1="30" y1="235" x2="30" y2="250" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="250" x2="370" y2="250" stroke="#333" stroke-width="1.5"/>
  <line x1="370" y1="235" x2="370" y2="250" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="275" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Total = 30 children</text>
</svg>