<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Factory Production</text>

  <!-- Y-axis -->
  <line x1="50" y1="50" x2="50" y2="250" stroke="black" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="50" y1="250" x2="400" y2="250" stroke="black" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="30" y="254" text-anchor="end" font-family="Arial" font-size="12">0</text>
  <text x="30" y="229" text-anchor="end" font-family="Arial" font-size="12">10</text>
  <text x="30" y="204" text-anchor="end" font-family="Arial" font-size="12">20</text>
  <text x="30" y="179" text-anchor="end" font-family="Arial" font-size="12">30</text>
  <text x="30" y="154" text-anchor="end" font-family="Arial" font-size="12">40</text>
  <text x="30" y="129" text-anchor="end" font-family="Arial" font-size="12">50</text>
  <text x="30" y="104" text-anchor="end" font-family="Arial" font-size="12">60</text>
  <text x="30" y="79" text-anchor="end" font-family="Arial" font-size="12">70</text>
  <text x="30" y="54" text-anchor="end" font-family="Arial" font-size="12">80</text>

  <!-- Y-axis ticks -->
  <line x1="47" y1="250" x2="50" y2="250" stroke="black" stroke-width="1"/>
  <line x1="47" y1="225" x2="50" y2="225" stroke="black" stroke-width="1"/>
  <line x1="47" y1="200" x2="50" y2="200" stroke="black" stroke-width="1"/>
  <line x1="47" y1="175" x2="50" y2="175" stroke="black" stroke-width="1"/>
  <line x1="47" y1="150" x2="50" y2="150" stroke="black" stroke-width="1"/>
  <line x1="47" y1="125" x2="50" y2="125" stroke="black" stroke-width="1"/>
  <line x1="47" y1="100" x2="50" y2="100" stroke="black" stroke-width="1"/>
  <line x1="47" y1="75" x2="50" y2="75" stroke="black" stroke-width="1"/>
  <line x1="47" y1="50" x2="50" y2="50" stroke="black" stroke-width="1"/>

  <!-- Bars -->
  <rect x="80" y="88" width="60" height="162" fill="lightskyblue" stroke="black" stroke-width="1"/>
  <rect x="160" y="75" width="60" height="175" fill="lightcoral" stroke="black" stroke-width="1"/>
  <rect x="240" y="63" width="60" height="187" fill="lightgreen" stroke="black" stroke-width="1"/>
  <rect x="320" y="75" width="60" height="175" fill="lightyellow" stroke="black" stroke-width="1"/>

  <!-- Bar labels -->
  <text x="110" y="270" text-anchor="middle" font-family="Arial" font-size="12">Q1</text>
  <text x="190" y="270" text-anchor="middle" font-family="Arial" font-size="12">Q2</text>
  <text x="270" y="270" text-anchor="middle" font-family="Arial" font-size="12">Q3</text>
  <text x="350" y="270" text-anchor="middle" font-family="Arial" font-size="12">Q4</text>
</svg>