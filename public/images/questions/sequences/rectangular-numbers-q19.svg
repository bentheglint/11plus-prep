  <circle cx="163" cy="97" r="3.5" fill="#333"/>
  <circle cx="185" cy="97" r="3.5" fill="#333"/>
  <circle cx="141" cy="119" r="3.5" fill="#333"/>
  <circle cx="163" cy="119" r="3.5" fill="#333"/>
  <circle cx="185" cy="119" r="3.5" fill="#333"/>
  <circle cx="141" cy="141" r="3.5" fill="#333"/>
  <circle cx="163" cy="141" r="3.5" fill="#333"/>
  <circle cx="185" cy="141" r="3.5" fill="#333"/>
  <circle cx="141" cy="163" r="3.5" fill="#333"/>
  <circle cx="163" cy="163" r="3.5" fill="#333"/>
  <circle cx="185" cy="163" r="3.5" fill="#333"/>
