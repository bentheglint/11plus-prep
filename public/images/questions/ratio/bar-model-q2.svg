<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Title -->
  <text x="200" y="30" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Tom and Jerry share marbles 3 : 5</text>

  <!-- Total label -->
  <text x="200" y="55" font-family="Arial" font-size="14" text-anchor="middle" fill="#555">80 marbles</text>

  <!-- Bar model: 8 equal parts, each 42.5px wide -->
  <!-- Tom: 3 parts (lightgreen) -->
  <rect x="30" y="80" width="42.5" height="80" fill="#90EE90" stroke="#333" stroke-width="1.5"/>
  <rect x="72.5" y="80" width="42.5" height="80" fill="#90EE90" stroke="#333" stroke-width="1.5"/>
  <rect x="115" y="80" width="42.5" height="80" fill="#90EE90" stroke="#333" stroke-width="1.5"/>

  <!-- Jerry: 5 parts (orange) -->
  <rect x="157.5" y="80" width="42.5" height="80" fill="#FFA500" stroke="#333" stroke-width="1.5"/>
  <rect x="200" y="80" width="42.5" height="80" fill="#FFA500" stroke="#333" stroke-width="1.5"/>
  <rect x="242.5" y="80" width="42.5" height="80" fill="#FFA500" stroke="#333" stroke-width="1.5"/>
  <rect x="285" y="80" width="42.5" height="80" fill="#FFA500" stroke="#333" stroke-width="1.5"/>
  <rect x="327.5" y="80" width="42.5" height="80" fill="#FFA500" stroke="#333" stroke-width="1.5"/>

  <!-- Question marks inside each section -->
  <text x="51.25" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="93.75" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="136.25" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="178.75" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="221.25" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="263.75" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="306.25" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>
  <text x="348.75" y="128" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#555">?</text>

  <!-- Tom bracket and label -->
  <line x1="30" y1="175" x2="30" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="190" x2="157.5" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="157.5" y1="175" x2="157.5" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="93.75" y="212" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E8B2E">Tom (3 parts)</text>

  <!-- Jerry bracket and label -->
  <line x1="157.5" y1="175" x2="157.5" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="157.5" y1="190" x2="370" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="370" y1="175" x2="370" y2="190" stroke="#333" stroke-width="1.5"/>
  <text x="263.75" y="212" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#CC7700">Jerry (5 parts)</text>

  <!-- Total bracket at bottom -->
  <line x1="30" y1="235" x2="30" y2="250" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="250" x2="370" y2="250" stroke="#333" stroke-width="1.5"/>
  <line x1="370" y1="235" x2="370" y2="250" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="275" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Total = 80 marbles</text>
</svg>