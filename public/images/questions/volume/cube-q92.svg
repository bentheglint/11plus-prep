<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Front face (SQUARE - 120x120) -->
  <path d="M 100 200 L 220 200 L 220 80 L 100 80 Z"
        fill="lightskyblue" fill-opacity="0.8" stroke="black" stroke-width="2"/>
  <!-- Top face (parallelogram) -->
  <path d="M 100 80 L 220 80 L 270 30 L 150 30 Z"
        fill="lightcyan" fill-opacity="0.9" stroke="black" stroke-width="2"/>
  <!-- Right face (parallelogram) -->
  <path d="M 220 200 L 270 150 L 270 30 L 220 80 Z"
        fill="skyblue" fill-opacity="0.7" stroke="black" stroke-width="2"/>
  <!-- LENGTH dimension line (bottom - 17 cm) -->
  <line x1="100" y1="220" x2="220" y2="220" stroke="gray" stroke-width="1"/>
  <line x1="100" y1="215" x2="100" y2="225" stroke="gray" stroke-width="1"/>
  <line x1="220" y1="215" x2="220" y2="225" stroke="gray" stroke-width="1"/>
  <text x="160" y="240" font-family="Arial" font-size="14" fill="dimgray" text-anchor="middle">17 cm</text>
  <!-- HEIGHT dimension line (left - 17 cm) -->
  <line x1="80" y1="200" x2="80" y2="80" stroke="gray" stroke-width="1"/>
  <line x1="75" y1="200" x2="85" y2="200" stroke="gray" stroke-width="1"/>
  <line x1="75" y1="80" x2="85" y2="80" stroke="gray" stroke-width="1"/>
  <text x="60" y="145" font-family="Arial" font-size="14" fill="dimgray" text-anchor="middle" transform="rotate(-90 60 145)">17 cm</text>
  <!-- DEPTH dimension line (bottom-right angled edge - 17 cm) -->
  <line x1="229" y1="209" x2="279" y2="159" stroke="gray" stroke-width="1"/>
  <line x1="225" y1="205" x2="233" y2="213" stroke="gray" stroke-width="1"/>
  <line x1="275" y1="155" x2="283" y2="163" stroke="gray" stroke-width="1"/>
  <line x1="225" y1="205" x2="220" y2="200" stroke="gray" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="275" y1="155" x2="270" y2="150" stroke="gray" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="270" y="196" font-family="Arial" font-size="14" fill="dimgray" text-anchor="middle" transform="rotate(-45 270 196)">17 cm</text>
</svg>
