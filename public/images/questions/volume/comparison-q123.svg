<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <!-- ===== BOX A (left) - Rectangular box 30cm x 20cm x 15cm ===== -->
  <!-- Front face (rectangle) - width:120px height:70px -->
  <path d="M 30 210 L 150 210 L 150 140 L 30 140 Z"
        fill="#E8F4FD" stroke="black" stroke-width="1.5"/>
  <!-- Top face (parallelogram) -->
  <path d="M 30 140 L 150 140 L 185 108 L 65 108 Z"
        fill="#9BB8CC" stroke="black" stroke-width="1.5"/>
  <!-- Right face (parallelogram) -->
  <path d="M 150 210 L 185 178 L 185 108 L 150 140 Z"
        fill="#B8D4E8" stroke="black" stroke-width="1.5"/>

  <!-- Box A dimension lines -->
  <!-- LENGTH (bottom - 30 cm) -->
  <line x1="30" y1="228" x2="150" y2="228" stroke="#CC0000" stroke-width="1"/>
  <polygon points="30,228 36,225 36,231" fill="#CC0000"/>
  <polygon points="150,228 144,225 144,231" fill="#CC0000"/>
  <line x1="30" y1="210" x2="30" y2="228" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="150" y1="210" x2="150" y2="228" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="90" y="245" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle">30 cm</text>

  <!-- HEIGHT (left - 15 cm) -->
  <line x1="14" y1="210" x2="14" y2="140" stroke="#CC0000" stroke-width="1"/>
  <polygon points="14,210 11,204 17,204" fill="#CC0000"/>
  <polygon points="14,140 11,146 17,146" fill="#CC0000"/>
  <line x1="30" y1="210" x2="14" y2="210" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="30" y1="140" x2="14" y2="140" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="-3" y="180" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle" transform="rotate(-90 -3 180)">15 cm</text>

  <!-- DEPTH (angled - 20 cm) -->
  <line x1="161" y1="221" x2="196" y2="189" stroke="#CC0000" stroke-width="1"/>
  <polygon points="161,221 166,216 168,222" fill="#CC0000"/>
  <polygon points="196,189 191,194 189,188" fill="#CC0000"/>
  <line x1="161" y1="221" x2="150" y2="210" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="196" y1="189" x2="185" y2="178" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="194" y="218" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle" transform="rotate(-45 194 218)">20 cm</text>

  <!-- Box A label -->
  <text x="90" y="96" font-family="Arial" font-size="15" fill="#333333" text-anchor="middle" font-weight="bold">Box A</text>

  <!-- ===== BOX B (right) - Cube 25cm edges ===== -->
  <!-- Front face (SQUARE - 100x100) -->
  <path d="M 290 210 L 390 210 L 390 110 L 290 110 Z"
        fill="#E8F4FD" stroke="black" stroke-width="1.5"/>
  <!-- Top face (parallelogram) -->
  <path d="M 290 110 L 390 110 L 430 70 L 330 70 Z"
        fill="#9BB8CC" stroke="black" stroke-width="1.5"/>
  <!-- Right face (parallelogram) -->
  <path d="M 390 210 L 430 170 L 430 70 L 390 110 Z"
        fill="#B8D4E8" stroke="black" stroke-width="1.5"/>

  <!-- Box B dimension lines -->
  <!-- LENGTH (bottom - 25 cm) -->
  <line x1="290" y1="228" x2="390" y2="228" stroke="#CC0000" stroke-width="1"/>
  <polygon points="290,228 296,225 296,231" fill="#CC0000"/>
  <polygon points="390,228 384,225 384,231" fill="#CC0000"/>
  <line x1="290" y1="210" x2="290" y2="228" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="390" y1="210" x2="390" y2="228" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="340" y="245" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle">25 cm</text>

  <!-- HEIGHT (left - 25 cm) -->
  <line x1="274" y1="210" x2="274" y2="110" stroke="#CC0000" stroke-width="1"/>
  <polygon points="274,210 271,204 277,204" fill="#CC0000"/>
  <polygon points="274,110 271,116 277,116" fill="#CC0000"/>
  <line x1="290" y1="210" x2="274" y2="210" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="290" y1="110" x2="274" y2="110" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="258" y="165" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle" transform="rotate(-90 258 165)">25 cm</text>

  <!-- DEPTH (angled - 25 cm) -->
  <line x1="401" y1="221" x2="441" y2="181" stroke="#CC0000" stroke-width="1"/>
  <polygon points="401,221 406,216 408,222" fill="#CC0000"/>
  <polygon points="441,181 436,186 434,180" fill="#CC0000"/>
  <line x1="401" y1="221" x2="390" y2="210" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="441" y1="181" x2="430" y2="170" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="438" y="214" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle" transform="rotate(-45 438 214)">25 cm</text>

  <!-- Box B label -->
  <text x="350" y="57" font-family="Arial" font-size="15" fill="#333333" text-anchor="middle" font-weight="bold">Box B</text>
</svg>