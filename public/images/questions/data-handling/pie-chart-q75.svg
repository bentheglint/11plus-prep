<svg xmlns="http://www.w3.org/2000/svg" width="500" height="450" viewBox="0 0 500 450">
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="black">Voting Results</text>

  <!-- Slice 1: Option A 126° (0° to 126°) -->
  <path d="M 250 225 L 250 125 A 100 100 0 0 1 330.9 283.8 Z" fill="lightcoral" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 2: Option B 90° (126° to 216°) -->
  <path d="M 250 225 L 330.9 283.8 A 100 100 0 0 1 191.2 305.9 Z" fill="lightskyblue" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 3: Option C 72° (216° to 288°) -->
  <path d="M 250 225 L 191.2 305.9 A 100 100 0 0 1 154.9 194.1 Z" fill="lightgreen" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 4: Option D 72° (288° to 360°) -->
  <path d="M 250 225 L 154.9 194.1 A 100 100 0 0 1 250 125 Z" fill="lightyellow" fill-opacity="0.9" stroke="black" stroke-width="2"/>

  <!-- Label line 1: Option A (mid 63°) -->
  <line x1="339.1" y1="179.6" x2="365.8" y2="166" stroke="gray" stroke-width="1"/>
  <text x="365.8" y="161" text-anchor="start" font-family="Arial" font-size="14" fill="black">Option A</text>
  <text x="365.8" y="179" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">126°</text>

  <!-- Label line 2: Option B (mid 171°) -->
  <line x1="265.6" y1="323.8" x2="270.3" y2="353.4" stroke="gray" stroke-width="1"/>
  <text x="270.3" y="348.4" text-anchor="start" font-family="Arial" font-size="14" fill="black">Option B</text>
  <text x="270.3" y="366.4" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Label line 3: Option C (mid 252°) -->
  <line x1="154.9" y1="255.9" x2="126.4" y2="265.2" stroke="gray" stroke-width="1"/>
  <text x="126.4" y="260.2" text-anchor="end" font-family="Arial" font-size="14" fill="black">Option C</text>
  <text x="126.4" y="278.2" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">72°</text>

  <!-- Label line 4: Option D (mid 324°) -->
  <line x1="191.2" y1="144.1" x2="173.6" y2="119.8" stroke="gray" stroke-width="1"/>
  <text x="173.6" y="114.8" text-anchor="end" font-family="Arial" font-size="14" fill="black">Option D</text>
  <text x="173.6" y="132.8" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">72°</text>

  <!-- Center point -->
  <circle cx="250" cy="225" r="3" fill="black"/>
</svg>