<svg width="450" height="300" xmlns="http://www.w3.org/2000/svg">
  <text x="225" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Book Sales Over 4 Weeks</text>
  <line x1="50" y1="50" x2="50" y2="250" stroke="black" stroke-width="2"/>
  <line x1="50" y1="250" x2="420" y2="250" stroke="black" stroke-width="2"/>
  <text x="35" y="255" font-family="Arial" font-size="12">0</text>
  <text x="30" y="210" font-family="Arial" font-size="12">20</text>
  <text x="30" y="170" font-family="Arial" font-size="12">40</text>
  <text x="30" y="130" font-family="Arial" font-size="12">60</text>
  <text x="30" y="90" font-family="Arial" font-size="12">80</text>
  <rect x="80" y="150" width="60" height="100" fill="lightskyblue" stroke="black" stroke-width="1"/>
  <text x="110" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 1</text>
  <rect x="170" y="130" width="60" height="120" fill="lightgreen" stroke="black" stroke-width="1"/>
  <text x="200" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 2</text>
  <rect x="260" y="140" width="60" height="110" fill="lightcoral" stroke="black" stroke-width="1"/>
  <text x="290" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 3</text>
  <rect x="350" y="140" width="60" height="110" fill="lightyellow" stroke="black" stroke-width="1"/>
  <text x="380" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 4</text>
</svg>
