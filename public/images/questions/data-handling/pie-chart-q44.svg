<svg xmlns="http://www.w3.org/2000/svg" width="500" height="450" viewBox="0 0 500 450">
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="black">Favourite Fruits</text>

  <!-- Slice 1: Apples 120° (0° to 120°) -->
  <path d="M 250 225 L 250 125 A 100 100 0 0 1 336.6 275 Z" fill="lightcoral" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 2: Bananas 90° (120° to 210°) -->
  <path d="M 250 225 L 336.6 275 A 100 100 0 0 1 200 311.6 Z" fill="lightyellow" fill-opacity="0.9" stroke="black" stroke-width="2"/>

  <!-- Slice 3: Oranges 80° (210° to 290°) -->
  <path d="M 250 225 L 200 311.6 A 100 100 0 0 1 156 190.8 Z" fill="lightskyblue" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Slice 4: Grapes 70° (290° to 360°) -->
  <path d="M 250 225 L 156 190.8 A 100 100 0 0 1 250 125 Z" fill="lightgreen" fill-opacity="0.7" stroke="black" stroke-width="2"/>

  <!-- Label line 1: Apples (mid 60°) -->
  <line x1="336.6" y1="175" x2="362.6" y2="160" stroke="gray" stroke-width="1"/>
  <text x="362.6" y="155" text-anchor="start" font-family="Arial" font-size="14" fill="black">Apples</text>
  <text x="362.6" y="173" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">120°</text>

  <!-- Label line 2: Bananas (mid 165°) -->
  <line x1="275.9" y1="321.6" x2="283.7" y2="350.6" stroke="gray" stroke-width="1"/>
  <text x="283.7" y="345.6" text-anchor="start" font-family="Arial" font-size="14" fill="black">Bananas</text>
  <text x="283.7" y="363.6" text-anchor="start" font-family="Arial" font-size="14" fill="dimgray">90°</text>

  <!-- Label line 3: Oranges (mid 250°) -->
  <line x1="156" y1="259.2" x2="127.9" y2="269.5" stroke="gray" stroke-width="1"/>
  <text x="127.9" y="264.5" text-anchor="end" font-family="Arial" font-size="14" fill="black">Oranges</text>
  <text x="127.9" y="282.5" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">80°</text>

  <!-- Label line 4: Grapes (mid 325°) -->
  <line x1="192.6" y1="143.1" x2="175.4" y2="118.5" stroke="gray" stroke-width="1"/>
  <text x="175.4" y="113.5" text-anchor="end" font-family="Arial" font-size="14" fill="black">Grapes</text>
  <text x="175.4" y="131.5" text-anchor="end" font-family="Arial" font-size="14" fill="dimgray">70°</text>

  <!-- Center point -->
  <circle cx="250" cy="225" r="3" fill="black"/>
</svg>