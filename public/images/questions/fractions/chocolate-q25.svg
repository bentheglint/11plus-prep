<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Chocolate bar: 6x4 = 24 pieces, 1/3 (8 pieces) eaten -->
  <!-- Grid layout: 6 columns x 4 rows -->
  <!-- Each cell: 45px wide x 40px tall -->
  <!-- Starting at x=65, y=50 -->

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="16" fill="black" font-weight="bold">Chocolate Bar - 24 Pieces</text>

  <!-- Outer border with rounded corners for chocolate bar look -->
  <rect x="62" y="47" width="276" height="166" rx="6" ry="6" fill="#8B6914" stroke="#5C4400" stroke-width="3"/>

  <!-- Row 1 (y=50): columns 1-6 -->
  <!-- Eaten pieces (1/3 = 8 pieces): first 2 columns fully (8 pieces) -->
  <rect x="65" y="50" width="45" height="40" fill="#F5DEB3" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="110" y="50" width="45" height="40" fill="#F5DEB3" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="155" y="50" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="200" y="50" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="245" y="50" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="290" y="50" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>

  <!-- Row 2 (y=90) -->
  <rect x="65" y="90" width="45" height="40" fill="#F5DEB3" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="110" y="90" width="45" height="40" fill="#F5DEB3" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="155" y="90" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="200" y="90" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="245" y="90" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="290" y="90" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>

  <!-- Row 3 (y=130) -->
  <rect x="65" y="130" width="45" height="40" fill="#F5DEB3" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="110" y="130" width="45" height="40" fill="#F5DEB3" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="155" y="130" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="200" y="130" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="245" y="130" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="290" y="130" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>

  <!-- Row 4 (y=170) -->
  <rect x="65" y="170" width="45" height="40" fill="#F5DEB3" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="110" y="170" width="45" height="40" fill="#F5DEB3" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="155" y="170" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="200" y="170" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="245" y="170" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>
  <rect x="290" y="170" width="45" height="40" fill="#D4A574" stroke="#8B6914" stroke-width="1.5" rx="2" ry="2"/>

  <!-- Dividing line between eaten and uneaten thirds -->
  <line x1="155" y1="47" x2="155" y2="213" stroke="red" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Bracket/label for eaten portion -->
  <text x="110" y="235" text-anchor="middle" font-family="Arial" font-size="14" fill="black">1/3 eaten</text>
  <text x="110" y="252" text-anchor="middle" font-family="Arial" font-size="13" fill="#666">(8 pieces)</text>

  <!-- Bracket/label for remaining portion -->
  <text x="267" y="235" text-anchor="middle" font-family="Arial" font-size="14" fill="black">2/3 remaining</text>
  <text x="267" y="252" text-anchor="middle" font-family="Arial" font-size="13" fill="#666">(16 pieces)</text>

  <!-- Legend -->
  <rect x="100" y="272" width="14" height="14" fill="#F5DEB3" stroke="black" stroke-width="1"/>
  <text x="118" y="284" font-family="Arial" font-size="12" fill="black">Eaten</text>
  <rect x="230" y="272" width="14" height="14" fill="#D4A574" stroke="black" stroke-width="1"/>
  <text x="248" y="284" font-family="Arial" font-size="12" fill="black">Uneaten</text>
</svg>