  <circle cx="226" cy="84" r="3" fill="#333"/>
  <circle cx="246" cy="84" r="3" fill="#333"/>
  <circle cx="266" cy="84" r="3" fill="#333"/>
  <circle cx="286" cy="84" r="3" fill="#333"/>
  <circle cx="226" cy="104" r="3" fill="#333"/>
  <circle cx="246" cy="104" r="3" fill="#333"/>
  <circle cx="266" cy="104" r="3" fill="#333"/>
  <circle cx="286" cy="104" r="3" fill="#333"/>
  <circle cx="226" cy="124" r="3" fill="#333"/>
  <circle cx="246" cy="124" r="3" fill="#333"/>
  <circle cx="266" cy="124" r="3" fill="#333"/>
  <circle cx="286" cy="124" r="3" fill="#333"/>
  <circle cx="226" cy="144" r="3" fill="#333"/>
  <circle cx="246" cy="144" r="3" fill="#333"/>
  <circle cx="266" cy="144" r="3" fill="#333"/>
  <circle cx="286" cy="144" r="3" fill="#333"/>
  <circle cx="226" cy="164" r="3" fill="#333"/>
  <circle cx="246" cy="164" r="3" fill="#333"/>
  <circle cx="266" cy="164" r="3" fill="#333"/>
  <circle cx="286" cy="164" r="3" fill="#333"/>
  <text x="256" y="196" text-anchor="middle" font-size="14" font-weight="bold">20</text>
  <text x="256" y="214" text-anchor="middle" font-size="11" fill="#666">4×5</text>

  <!-- ? for 5th -->
  <text x="348" y="140" text-anchor="middle" font-size="32" fill="red" font-weight="bold">?</text>
  <text x="348" y="196" text-anchor="middle" font-size="14" fill="red" font-weight="bold">?</text>
  <text x="348" y="214" text-anchor="middle" font-size="11" fill="#666">5×6</text>

  <!-- Difference arrows at bottom -->
  <text x="57" y="248" text-anchor="middle" font-size="12" fill="#888">+4</text>
  <text x="125" y="248" text-anchor="middle" font-size="12" fill="#888">+6</text>
  <text x="210" y="248" text-anchor="middle" font-size="12" fill="#888">+8</text>
  <text x="302" y="248" text-anchor="middle" font-size="12" fill="red">+10</text>

  <!-- Bottom text -->
  <text x="200" y="276" text-anchor="middle" font-size="12" fill="#555">Each rectangle grows by 1 in both dimensions</text>
