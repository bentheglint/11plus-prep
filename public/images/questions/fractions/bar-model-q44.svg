<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Comparing 3/5 vs 5/8 -->
  <!-- Two bars of equal length (320px) -->

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="Arial" font-size="16" fill="black" font-weight="bold">Which is larger: 3/5 or 5/8?</text>

  <!-- Bar 1: 3/5 — divided into 5 parts (each 64px), 3 shaded -->
  <text x="200" y="60" text-anchor="middle" font-family="Arial" font-size="15" fill="black">3/5</text>
  <rect x="40" y="68" width="64" height="55" fill="lightskyblue" stroke="black" stroke-width="2"/>
  <rect x="104" y="68" width="64" height="55" fill="lightskyblue" stroke="black" stroke-width="2"/>
  <rect x="168" y="68" width="64" height="55" fill="lightskyblue" stroke="black" stroke-width="2"/>
  <rect x="232" y="68" width="64" height="55" fill="white" stroke="black" stroke-width="2"/>
  <rect x="296" y="68" width="64" height="55" fill="white" stroke="black" stroke-width="2"/>
  <!-- Unit labels -->
  <text x="72" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="black">1/5</text>
  <text x="136" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="black">1/5</text>
  <text x="200" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="black">1/5</text>
  <text x="264" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="black">1/5</text>
  <text x="328" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="black">1/5</text>

  <!-- Shaded extent line for 3/5 = 192px -->
  <line x1="232" y1="123" x2="232" y2="175" stroke="red" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bar 2: 5/8 — divided into 8 parts (each 40px), 5 shaded -->
  <text x="200" y="190" text-anchor="middle" font-family="Arial" font-size="15" fill="black">5/8</text>
  <rect x="40" y="198" width="40" height="55" fill="#5BB5E8" stroke="black" stroke-width="2"/>
  <rect x="80" y="198" width="40" height="55" fill="#5BB5E8" stroke="black" stroke-width="2"/>
  <rect x="120" y="198" width="40" height="55" fill="#5BB5E8" stroke="black" stroke-width="2"/>
  <rect x="160" y="198" width="40" height="55" fill="#5BB5E8" stroke="black" stroke-width="2"/>
  <rect x="200" y="198" width="40" height="55" fill="#5BB5E8" stroke="black" stroke-width="2"/>
  <rect x="240" y="198" width="40" height="55" fill="white" stroke="black" stroke-width="2"/>
  <rect x="280" y="198" width="40" height="55" fill="white" stroke="black" stroke-width="2"/>
  <rect x="320" y="198" width="40" height="55" fill="white" stroke="black" stroke-width="2"/>
  <!-- Unit labels -->
  <text x="60" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="black">1/8</text>
  <text x="100" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="black">1/8</text>
  <text x="140" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="black">1/8</text>
  <text x="180" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="black">1/8</text>
  <text x="220" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="black">1/8</text>
  <text x="260" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="black">1/8</text>
  <text x="300" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="black">1/8</text>
  <text x="340" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="black">1/8</text>

  <!-- Shaded extent line for 5/8 = 200px -->
  <line x1="240" y1="123" x2="240" y2="253" stroke="red" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Annotation -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial" font-size="14" fill="black">5/8 is slightly larger than 3/5</text>
</svg>