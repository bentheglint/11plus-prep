<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <!--
    L-shaped solid: 10x6x4 cuboid with 5x3x4 corner cut from back-right
    Scale: 1cm = 16px (horizontal), depth offset = 7px right + 7px up per cm
    Height: 4cm = 72px

    Front-bottom-left anchor: (55, 245)
    Key vertices:
      A(55,245) B(215,245) C(215,173) D(55,173)   - front face
      E(97,203) F(97,131)                          - back-left (6cm depth)
      G(236,224) H(236,152)                        - right side (3cm depth)
      I(156,224) J(156,152)                        - step inner corner (3cm depth, 5cm from left)
      K(177,203) L(177,131)                        - step inner corner (6cm depth, 5cm from left)
  -->

  <!-- FACES drawn back-to-front for correct overlap -->

  <!-- Left side face: 6cm depth x 4cm height -->
  <path d="M 55 245 L 97 203 L 97 131 L 55 173 Z"
        fill="#B8D4E8" stroke="black" stroke-width="1.5"/>

  <!-- Step inner wall: vertical face at step position, 3cm to 6cm depth, 4cm height -->
  <path d="M 156 224 L 177 203 L 177 131 L 156 152 Z"
        fill="#B8D4E8" stroke="black" stroke-width="1.5"/>

  <!-- Top face - LEFT portion: 5cm wide x 6cm depth (pentagon) -->
  <path d="M 55 173 L 135 173 L 156 152 L 177 131 L 97 131 Z"
        fill="#9BB8CC" stroke="black" stroke-width="1.5"/>

  <!-- Top face - RIGHT portion: 5cm wide x 3cm depth -->
  <path d="M 135 173 L 215 173 L 236 152 L 156 152 Z"
        fill="#9BB8CC" stroke="black" stroke-width="1.5"/>

  <!-- Front face: full 10cm x 4cm height -->
  <path d="M 55 245 L 215 245 L 215 173 L 55 173 Z"
        fill="#E8F4FD" stroke="black" stroke-width="1.5"/>

  <!-- Right side face: 3cm depth x 4cm height -->
  <path d="M 215 245 L 236 224 L 236 152 L 215 173 Z"
        fill="#B8D4E8" stroke="black" stroke-width="1.5"/>

  <!-- Dashed ghost lines showing the removed corner of original cuboid -->
  <line x1="236" y1="224" x2="257" y2="203" stroke="#AAAAAA" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="236" y1="152" x2="257" y2="131" stroke="#AAAAAA" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="257" y1="203" x2="257" y2="131" stroke="#AAAAAA" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="177" y1="131" x2="257" y2="131" stroke="#AAAAAA" stroke-width="0.7" stroke-dasharray="4,3"/>
  <line x1="177" y1="203" x2="257" y2="203" stroke="#AAAAAA" stroke-width="0.7" stroke-dasharray="4,3"/>

  <!-- ==================== DIMENSION LINES ==================== -->

  <!-- TOTAL LENGTH: 10 cm (below front face, horizontal) -->
  <line x1="55" y1="248" x2="55" y2="268" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="215" y1="248" x2="215" y2="268" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="55" y1="264" x2="215" y2="264" stroke="#CC0000" stroke-width="1"/>
  <polygon points="55,264 63,261 63,267" fill="#CC0000"/>
  <polygon points="215,264 207,261 207,267" fill="#CC0000"/>
  <text x="135" y="281" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle" font-weight="bold">10 cm</text>

  <!-- TOTAL WIDTH/DEPTH: 6 cm (along top-left diagonal edge) -->
  <line x1="43" y1="173" x2="55" y2="173" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="85" y1="131" x2="97" y2="131" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="43" y1="173" x2="85" y2="131" stroke="#CC0000" stroke-width="1"/>
  <polygon points="43,173 49,170 49,176" fill="#CC0000"/>
  <polygon points="85,131 79,128 79,134" fill="#CC0000"/>
  <text x="50" y="146" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle" font-weight="bold" transform="rotate(-45 50 146)">6 cm</text>

  <!-- HEIGHT: 4 cm (left of front face, vertical) -->
  <line x1="35" y1="245" x2="35" y2="173" stroke="#CC0000" stroke-width="1"/>
  <line x1="30" y1="245" x2="40" y2="245" stroke="#CC0000" stroke-width="1"/>
  <line x1="30" y1="173" x2="40" y2="173" stroke="#CC0000" stroke-width="1"/>
  <polygon points="35,173 32,181 38,181" fill="#CC0000"/>
  <polygon points="35,245 32,237 38,237" fill="#CC0000"/>
  <text x="18" y="213" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle" font-weight="bold" transform="rotate(-90 18 213)">4 cm</text>

  <!-- CUT LENGTH: 5 cm (horizontal, above the step on top face) -->
  <line x1="156" y1="152" x2="156" y2="125" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="236" y1="152" x2="236" y2="125" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="156" y1="129" x2="236" y2="129" stroke="#CC0000" stroke-width="1"/>
  <polygon points="156,129 164,126 164,132" fill="#CC0000"/>
  <polygon points="236,129 228,126 228,132" fill="#CC0000"/>
  <text x="196" y="122" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="middle" font-weight="bold">5 cm</text>

  <!-- CUT DEPTH: 3 cm (angled, along depth from step edge to ghost corner) -->
  <!-- From H(236,152) to ghost corner (257,131), offset outward to the right -->
  <line x1="243" y1="155" x2="236" y2="152" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="264" y1="134" x2="257" y2="131" stroke="#CC0000" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="243" y1="155" x2="264" y2="134" stroke="#CC0000" stroke-width="1"/>
  <line x1="239" y1="151" x2="247" y2="159" stroke="#CC0000" stroke-width="1"/>
  <line x1="260" y1="130" x2="268" y2="138" stroke="#CC0000" stroke-width="1"/>
  <polygon points="243,155 249,153 247,147" fill="#CC0000"/>
  <polygon points="264,134 258,136 260,142" fill="#CC0000"/>
  <text x="268" y="138" font-family="Arial" font-size="14" fill="#CC0000" text-anchor="start" font-weight="bold" transform="rotate(-45 268 138)">3 cm</text>
</svg>