# Weekly Tested-Restore Loop (Plan A v2.1, Script 4)
#
# Exercises the recovery layer end-to-end every Sunday at 03:00 UTC.
#
#   Path A — wrangler d1 export --remote → fresh local staging D1 → import →
#            row-count audit → last-good-restore-export-<date>.json
#   Path B — drill D1 bookmark capture → sentinel insert → time-travel restore
#            → sentinel verified absent → last-good-restore-timetravel-<date>.json
#
# Both paths must succeed. Failure exit codes are triaged in the script:
#   10 EXPORT_FAILED, 11 IMPORT_FAILED, 12 TIMETRAVEL_FAILED, 13 ROWCOUNT_MISMATCH.
#
# Required GitHub secrets (set via Settings → Secrets → Actions):
#   - CLOUDFLARE_API_TOKEN  Cloudflare API token with D1 read+write on the
#                           account, scoped to (or including) both
#                           `11plus-user-data` and `11plus-restore-drill`.
#   - CLOUDFLARE_ACCOUNT_ID d2ab95cc060e1c5684627a0f46ff1a22 (this account)
#
# Failure notification path: a failed workflow run pings the repo's default
# email address (configured in your GitHub notification settings). Worth
# verifying the email lands once after the first scheduled run.

name: Weekly Restore Test (Plan A v2.1)

on:
  schedule:
    - cron: '0 3 * * 0'  # Sundays 03:00 UTC
  workflow_dispatch:     # manual trigger for ad-hoc debugging

permissions:
  contents: read
  actions: write

jobs:
  restore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DRILL_DB_NAME: 11plus-restore-drill
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install -g wrangler@4.70.0

      - name: Verify wrangler authentication
        run: wrangler whoami

      - name: Run Script 4 (both paths)
        run: node scripts/process-gates/weekly-restore-test.mjs

      - name: Upload restore artefacts
        if: always()  # capture artefacts even on failure for debugging
        uses: actions/upload-artifact@v4
        with:
          name: restore-test-${{ github.run_id }}
          path: |
            process-gate-artefacts/last-good-restore-*.json
          retention-days: 90
          if-no-files-found: ignore
