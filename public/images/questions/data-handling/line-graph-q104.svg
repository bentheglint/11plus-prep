<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300">
  <!-- Title -->
  <text x="225" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Weekly Progress</text>

  <!-- Y-axis -->
  <line x1="50" y1="50" x2="50" y2="250" stroke="black" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="50" y1="250" x2="430" y2="250" stroke="black" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="30" y="254" text-anchor="end" font-family="Arial" font-size="12">0</text>
  <text x="30" y="214" text-anchor="end" font-family="Arial" font-size="12">10</text>
  <text x="30" y="174" text-anchor="end" font-family="Arial" font-size="12">20</text>
  <text x="30" y="134" text-anchor="end" font-family="Arial" font-size="12">30</text>
  <text x="30" y="94" text-anchor="end" font-family="Arial" font-size="12">40</text>
  <text x="30" y="54" text-anchor="end" font-family="Arial" font-size="12">50</text>

  <!-- Y-axis gridlines -->
  <line x1="50" y1="210" x2="430" y2="210" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="170" x2="430" y2="170" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="130" x2="430" y2="130" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="90" x2="430" y2="90" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="50" x2="430" y2="50" stroke="#ddd" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="80" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 1</text>
  <text x="140" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 2</text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 3</text>
  <text x="260" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 4</text>
  <text x="320" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 5</text>
  <text x="380" y="270" text-anchor="middle" font-family="Arial" font-size="12">Week 6</text>

  <!-- Data line -->
  <polyline points="80,170 140,150 200,130 260,110 320,94 380,78" fill="none" stroke="blue" stroke-width="2"/>

  <!-- Data points -->
  <circle cx="80" cy="170" r="4" fill="blue"/>
  <circle cx="140" cy="150" r="4" fill="blue"/>
  <circle cx="200" cy="130" r="4" fill="blue"/>
  <circle cx="260" cy="110" r="4" fill="blue"/>
  <circle cx="320" cy="94" r="4" fill="blue"/>
  <circle cx="380" cy="78" r="4" fill="blue"/>
</svg>