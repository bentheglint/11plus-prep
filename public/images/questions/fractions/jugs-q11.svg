<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Two jugs side by side: one 2/3 full, one 3/4 full -->

  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-family="Arial" font-size="16" fill="black" font-weight="bold">Two Jugs of Squash</text>

  <!-- JUG 1: 2/3 full (left side) -->
  <!-- Jug body: trapezoid shape from (40,70) to (150,70) at top, (30,250) to (160,250) at bottom -->
  <defs>
    <clipPath id="jug1Clip">
      <path d="M55,65 L145,65 L155,250 L45,250 Z"/>
    </clipPath>
    <clipPath id="jug2Clip">
      <path d="M245,65 L335,65 L345,250 L235,250 Z"/>
    </clipPath>
  </defs>

  <!-- Jug 1 outline -->
  <path d="M55,65 L145,65 L155,250 Q155,260 145,260 L55,260 Q45,260 45,250 Z" fill="white" stroke="gray" stroke-width="2.5"/>
  <!-- Jug 1 handle -->
  <path d="M145,90 Q175,90 175,130 Q175,170 145,170" fill="none" stroke="gray" stroke-width="2.5"/>

  <!-- Jug 1 liquid: 2/3 full -->
  <!-- Body height: 65 to 250 = 185px. 2/3 = ~123px from bottom. Top of liquid: 250 - 123 = 127 -->
  <rect x="45" y="127" width="115" height="125" fill="#87CEEB" fill-opacity="0.7" clip-path="url(#jug1Clip)"/>

  <!-- Jug 1 level marks (thirds): 65 + 61.7 = 127, 65 + 123.3 = 188 -->
  <line x1="48" y1="127" x2="62" y2="127" stroke="gray" stroke-width="1.5"/>
  <line x1="140" y1="127" x2="152" y2="127" stroke="gray" stroke-width="1.5"/>
  <line x1="48" y1="188" x2="62" y2="188" stroke="gray" stroke-width="1.5"/>
  <line x1="142" y1="188" x2="154" y2="188" stroke="gray" stroke-width="1.5"/>

  <!-- Jug 1 fraction labels -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial" font-size="14" fill="black">2/3</text>
  <text x="100" y="176" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">full</text>

  <!-- Jug 1 label -->
  <text x="100" y="285" text-anchor="middle" font-family="Arial" font-size="14" fill="black">Jug A</text>

  <!-- JUG 2: 3/4 full (right side) -->
  <!-- Jug 2 outline -->
  <path d="M245,65 L335,65 L345,250 Q345,260 335,260 L245,260 Q235,260 235,250 Z" fill="white" stroke="gray" stroke-width="2.5"/>
  <!-- Jug 2 handle -->
  <path d="M335,90 Q365,90 365,130 Q365,170 335,170" fill="none" stroke="gray" stroke-width="2.5"/>

  <!-- Jug 2 liquid: 3/4 full -->
  <!-- Body height: 65 to 250 = 185px. 3/4 = ~139px from bottom. Top of liquid: 250 - 139 = 111 -->
  <rect x="235" y="111" width="115" height="141" fill="#FFA07A" fill-opacity="0.6" clip-path="url(#jug2Clip)"/>

  <!-- Jug 2 level marks (quarters): 65+46.25=111, 65+92.5=158, 65+138.75=204 -->
  <line x1="238" y1="111" x2="252" y2="111" stroke="gray" stroke-width="1.5"/>
  <line x1="330" y1="111" x2="342" y2="111" stroke="gray" stroke-width="1.5"/>
  <line x1="238" y1="158" x2="252" y2="158" stroke="gray" stroke-width="1.5"/>
  <line x1="332" y1="158" x2="344" y2="158" stroke="gray" stroke-width="1.5"/>
  <line x1="238" y1="204" x2="252" y2="204" stroke="gray" stroke-width="1.5"/>
  <line x1="334" y1="204" x2="346" y2="204" stroke="gray" stroke-width="1.5"/>

  <!-- Jug 2 fraction labels -->
  <text x="290" y="155" text-anchor="middle" font-family="Arial" font-size="14" fill="black">3/4</text>
  <text x="290" y="171" text-anchor="middle" font-family="Arial" font-size="12" fill="#555">full</text>

  <!-- Jug 2 label -->
  <text x="290" y="285" text-anchor="middle" font-family="Arial" font-size="14" fill="black">Jug B</text>

  <!-- Comparison line showing 3/4 > 2/3 -->
  <line x1="170" y1="111" x2="230" y2="111" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="127" x2="230" y2="127" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#555">Which has more?</text>
</svg>