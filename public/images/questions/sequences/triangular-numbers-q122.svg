<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    text { font-family: Arial, sans-serif; fill: #333; }
  </style>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-size="16" font-weight="bold">Triangular Numbers</text>
  <text x="200" y="48" text-anchor="middle" font-size="13" fill="#555">1, 3, 6, 10, ...</text>

  <!-- T1 = 1 dot (single dot) -->
  <circle cx="28" cy="160" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="28" y="196" text-anchor="middle" font-size="15" font-weight="bold">1</text>

  <!-- T2 = 3 dots (triangle: 1 top, 2 bottom) -->
  <!-- Row 1: 1 dot -->
  <circle cx="82" cy="140" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <!-- Row 2: 2 dots -->
  <circle cx="70" cy="164" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="94" cy="164" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="82" y="200" text-anchor="middle" font-size="15" font-weight="bold">3</text>

  <!-- T3 = 6 dots (triangle: 1, 2, 3) -->
  <!-- Row 1: 1 dot -->
  <circle cx="158" cy="118" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <!-- Row 2: 2 dots -->
  <circle cx="146" cy="142" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="170" cy="142" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <!-- Row 3: 3 dots -->
  <circle cx="134" cy="166" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="158" cy="166" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="182" cy="166" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="158" y="202" text-anchor="middle" font-size="15" font-weight="bold">6</text>

  <!-- T4 = 10 dots (triangle: 1, 2, 3, 4) -->
  <!-- Row 1: 1 dot -->
  <circle cx="262" cy="96" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <!-- Row 2: 2 dots -->
  <circle cx="250" cy="120" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="274" cy="120" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <!-- Row 3: 3 dots -->
  <circle cx="238" cy="144" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="262" cy="144" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="286" cy="144" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <!-- Row 4: 4 dots -->
  <circle cx="226" cy="168" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="250" cy="168" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="274" cy="168" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <circle cx="298" cy="168" r="10" fill="#87CEEB" stroke="black" stroke-width="1.5"/>
  <text x="262" y="204" text-anchor="middle" font-size="15" font-weight="bold">10</text>

  <!-- Continuation dots and ? -->
  <text x="340" y="145" text-anchor="middle" font-size="20" fill="#888">...</text>

  <!-- Row labels showing +2, +3, +4 pattern -->
  <text x="55" y="248" text-anchor="middle" font-size="12" fill="#888">+2</text>
  <line x1="38" y1="244" x2="48" y2="240" stroke="#aaa" stroke-width="1"/>
  <line x1="62" y1="240" x2="72" y2="244" stroke="#aaa" stroke-width="1"/>

  <text x="120" y="248" text-anchor="middle" font-size="12" fill="#888">+3</text>
  <line x1="100" y1="244" x2="112" y2="240" stroke="#aaa" stroke-width="1"/>
  <line x1="128" y1="240" x2="140" y2="244" stroke="#aaa" stroke-width="1"/>

  <text x="210" y="248" text-anchor="middle" font-size="12" fill="#888">+4</text>
  <line x1="185" y1="244" x2="198" y2="240" stroke="#aaa" stroke-width="1"/>
  <line x1="222" y1="240" x2="235" y2="244" stroke="#aaa" stroke-width="1"/>

  <!-- Subscript labels -->
  <text x="28" y="222" text-anchor="middle" font-size="11" fill="#666">T1</text>
  <text x="82" y="222" text-anchor="middle" font-size="11" fill="#666">T2</text>
  <text x="158" y="222" text-anchor="middle" font-size="11" fill="#666">T3</text>
  <text x="262" y="222" text-anchor="middle" font-size="11" fill="#666">T4</text>

  <!-- Bottom text -->
  <text x="200" y="280" text-anchor="middle" font-size="12" fill="#555">Each row adds one more dot than the last</text>
</svg>