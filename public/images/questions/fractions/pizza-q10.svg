<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Pizza cut into 8 equal slices, 3 eaten (shown in gray) -->
  <defs>
    <clipPath id="slice0"><path d="M200,140 L200,40 A100,100 0 0,1 270.7,69.3 Z"/></clipPath>
    <clipPath id="slice1"><path d="M200,140 L270.7,69.3 A100,100 0 0,1 300,140 Z"/></clipPath>
    <clipPath id="slice2"><path d="M200,140 L300,140 A100,100 0 0,1 270.7,210.7 Z"/></clipPath>
    <clipPath id="slice3"><path d="M200,140 L270.7,210.7 A100,100 0 0,1 200,240 Z"/></clipPath>
    <clipPath id="slice4"><path d="M200,140 L200,240 A100,100 0 0,1 129.3,210.7 Z"/></clipPath>
    <clipPath id="slice5"><path d="M200,140 L129.3,210.7 A100,100 0 0,1 100,140 Z"/></clipPath>
    <clipPath id="slice6"><path d="M200,140 L100,140 A100,100 0 0,1 129.3,69.3 Z"/></clipPath>
    <clipPath id="slice7"><path d="M200,140 L129.3,69.3 A100,100 0 0,1 200,40 Z"/></clipPath>
  </defs>

  <!-- Title -->
  <text x="200" y="24" text-anchor="middle" font-family="Arial" font-size="16" fill="black" font-weight="bold">Pizza - 8 Equal Slices</text>

  <!-- Full circle background -->
  <circle cx="200" cy="140" r="100" fill="white" stroke="black" stroke-width="2"/>

  <!-- Remaining slices (lightskyblue and light yellow alternating) -->
  <rect x="90" y="30" width="220" height="220" fill="lightskyblue" clip-path="url(#slice0)"/>
  <rect x="90" y="30" width="220" height="220" fill="#FFFACD" clip-path="url(#slice1)"/>
  <rect x="90" y="30" width="220" height="220" fill="lightskyblue" clip-path="url(#slice2)"/>
  <!-- Slices 3, 4, 5 are eaten (light gray) -->
  <rect x="90" y="30" width="220" height="220" fill="#D3D3D3" clip-path="url(#slice3)"/>
  <rect x="90" y="30" width="220" height="220" fill="#D3D3D3" clip-path="url(#slice4)"/>
  <rect x="90" y="30" width="220" height="220" fill="#D3D3D3" clip-path="url(#slice5)"/>
  <!-- Remaining slices -->
  <rect x="90" y="30" width="220" height="220" fill="#FFFACD" clip-path="url(#slice6)"/>
  <rect x="90" y="30" width="220" height="220" fill="lightskyblue" clip-path="url(#slice7)"/>

  <!-- Circle outline -->
  <circle cx="200" cy="140" r="100" fill="none" stroke="black" stroke-width="2"/>

  <!-- Division lines (8 slices = lines every 45 degrees) -->
  <line x1="200" y1="140" x2="200" y2="40" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="270.7" y2="69.3" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="300" y2="140" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="270.7" y2="210.7" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="200" y2="240" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="129.3" y2="210.7" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="100" y2="140" stroke="black" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="129.3" y2="69.3" stroke="black" stroke-width="1.5"/>

  <!-- "Eaten" label with cross-hatch pattern on eaten slices -->
  <text x="155" y="205" text-anchor="middle" font-family="Arial" font-size="13" fill="#555">eaten</text>
  <!-- Legend -->
  <rect x="100" y="264" width="14" height="14" fill="lightskyblue" stroke="black" stroke-width="1"/>
  <text x="118" y="276" font-family="Arial" font-size="12" fill="black">Remaining (5 slices)</text>
  <rect x="235" y="264" width="14" height="14" fill="#D3D3D3" stroke="black" stroke-width="1"/>
  <text x="253" y="276" font-family="Arial" font-size="12" fill="black">Eaten (3 slices)</text>
</svg>