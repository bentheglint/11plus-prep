<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">

  <!-- Number line: from -8 to 6 -->
  <!-- x positions: -8 at x=30, 6 at x=370. Each unit = (370-30)/14 = 24.29px -->
  <line x1="25" y1="165" x2="380" y2="165" stroke="#3b82f6" stroke-width="2"/>

  <!-- Arrowheads -->
  <polygon points="22,165 30,161 30,169" fill="#3b82f6"/>
  <polygon points="383,165 375,161 375,169" fill="#3b82f6"/>

  <!-- Tick marks and labels -->
  <!-- -8 at x=30 -->
  <line x1="30" y1="160" x2="30" y2="170" stroke="#3b82f6" stroke-width="2"/>
  <text x="30" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">-8</text>

  <!-- -7 at x=54.3 -->
  <line x1="54.3" y1="162" x2="54.3" y2="168" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- -6 at x=78.6 -->
  <line x1="78.6" y1="160" x2="78.6" y2="170" stroke="#3b82f6" stroke-width="2"/>
  <text x="78.6" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">-6</text>

  <!-- -5 at x=102.9 -->
  <line x1="102.9" y1="162" x2="102.9" y2="168" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- -4 at x=127.1 -->
  <line x1="127.1" y1="160" x2="127.1" y2="170" stroke="#3b82f6" stroke-width="2"/>
  <text x="127.1" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">-4</text>

  <!-- -3 at x=151.4 -->
  <line x1="151.4" y1="160" x2="151.4" y2="170" stroke="#3b82f6" stroke-width="2"/>
  <text x="151.4" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">-3</text>

  <!-- -2 at x=175.7 -->
  <line x1="175.7" y1="162" x2="175.7" y2="168" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- -1 at x=200 -->
  <line x1="200" y1="160" x2="200" y2="170" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">-1</text>

  <!-- 0 at x=224.3 -->
  <line x1="224.3" y1="158" x2="224.3" y2="172" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="224.3" y="187" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">0</text>

  <!-- 1 at x=248.6 -->
  <line x1="248.6" y1="162" x2="248.6" y2="168" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- 2 at x=272.9 -->
  <line x1="272.9" y1="160" x2="272.9" y2="170" stroke="#3b82f6" stroke-width="2"/>
  <text x="272.9" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">2</text>

  <!-- 3 at x=297.1 -->
  <line x1="297.1" y1="162" x2="297.1" y2="168" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- 4 at x=321.4 -->
  <line x1="321.4" y1="160" x2="321.4" y2="170" stroke="#3b82f6" stroke-width="2"/>
  <text x="321.4" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">4</text>

  <!-- 5 at x=345.7 -->
  <line x1="345.7" y1="162" x2="345.7" y2="168" stroke="#93c5fd" stroke-width="1.5"/>

  <!-- 6 at x=370 -->
  <line x1="370" y1="160" x2="370" y2="170" stroke="#3b82f6" stroke-width="2"/>
  <text x="370" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">6</text>

  <!-- Blue dots for the five numbers: -1, 4, -6, 2, -3 -->
  <!-- -6 at x=78.6 -->
  <circle cx="78.6" cy="165" r="7" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="78.6" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">-6</text>
  <line x1="78.6" y1="140" x2="78.6" y2="157" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- -3 at x=151.4 -->
  <circle cx="151.4" cy="165" r="7" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="151.4" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">-3</text>
  <line x1="151.4" y1="120" x2="151.4" y2="157" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- -1 at x=200 -->
  <circle cx="200" cy="165" r="7" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="200" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">-1</text>
  <line x1="200" y1="140" x2="200" y2="157" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 2 at x=272.9 -->
  <circle cx="272.9" cy="165" r="7" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="272.9" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">2</text>
  <line x1="272.9" y1="120" x2="272.9" y2="157" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 4 at x=321.4 -->
  <circle cx="321.4" cy="165" r="7" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="321.4" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6366f1">4</text>
  <line x1="321.4" y1="140" x2="321.4" y2="157" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Hint text -->
  <text x="200" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" font-style="italic">Smaller numbers are further left</text>
</svg>