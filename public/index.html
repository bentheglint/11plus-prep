<!DOCTYPE html>
<html lang="en-GB">
  <head>
<script src="https://cdn.tailwindcss.com"></script>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6C5CE7" />
    <meta
      name="description"
      content="11+ exam preparation for GL Assessment — maths, English and verbal reasoning practice for children preparing for grammar school entrance."
    />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <!-- NOTE: og:image + twitter:image intentionally omitted until a proper 1200x630 branded asset exists. logo512.png is still the default React logo. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="11+ Test Prep" />
    <meta property="og:title" content="11+ Test Prep" />
    <meta property="og:description" content="11+ exam preparation for GL Assessment — maths, English and verbal reasoning practice for children preparing for grammar school entrance." />
    <meta property="og:url" content="https://11plus-prep.pages.dev/" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="11+ Test Prep" />
    <meta name="twitter:description" content="11+ exam preparation for GL Assessment — maths, English and verbal reasoning practice for children preparing for grammar school entrance." />

    <!-- Fonts self-hosted via @fontsource (imported in index.js) — no external requests -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>11+ Test Prep</title>
  </head>
